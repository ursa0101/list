<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>✨ 我的計劃本</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
      :root {
        --cream: #faf7f2;
        --cream2: #f4efe6;
        --cream3: #ede6d8;
        --brown-light: #c4a882;
        --brown: #9b7b5a;
        --brown-dark: #6b5240;
        --pink: #f2a7b8;
        --pink-light: #fce8ee;
        --green: #7bc8a4;
        --green-light: #e8f7f0;
        --yellow: #f7d98c;
        --yellow-light: #fef8e7;
        --blue: #a7c4e8;
        --blue-light: #eaf2fb;
        --purple: #c4a8e8;
        --purple-light: #f3edfb;
        --text: #5c4a38;
        --text-muted: #9b8878;
        --border: #e2d8cc;
        --shadow: rgba(156, 123, 90, 0.12);
        --radius: 16px;
        --radius-sm: 10px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Nunito", "Zen Maru Gothic", sans-serif;
        background: var(--cream);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* === TOP BAR === */
      .topbar {
        background: var(--cream);
        border-bottom: 1.5px solid var(--border);
        padding: 14px 20px 0;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 12px var(--shadow);
      }

      .topbar-title {
        font-size: 20px;
        font-weight: 800;
        color: var(--brown-dark);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #topbarTitleText {
        outline: none;
        transition: background 0.2s;
        border-radius: var(--radius-sm);
        padding: 2px 6px;
        cursor: pointer;
      }
      #topbarTitleText:focus {
        background: var(--cream2);
        box-shadow: 0 0 0 1.5px var(--border);
      }

      .title-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--pink);
        display: inline-block;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.3);
          opacity: 0.7;
        }
      }

      /* === TABS STRIP === */
      .tabs-wrap {
        display: flex;
        align-items: center;
        gap: 4px;
        overflow-x: auto;
        padding-bottom: 0;
        scrollbar-width: none;
      }
      .tabs-wrap::-webkit-scrollbar {
        display: none;
      }

      .tab-group {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 3px;
        background: var(--cream2);
        border-radius: var(--radius) var(--radius) 0 0;
        border: 1.5px solid var(--border);
        border-bottom: none;
        position: relative;
        transition: all 0.2s;
      }

      .tab-group.dragover {
        background: var(--cream3);
        border-color: var(--brown);
        transform: scale(1.02);
      }

      .folder-icon {
        font-size: 13px;
        font-weight: 700;
        padding: 5px 10px;
        border-radius: 8px;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s;
        color: var(--brown);
        white-space: nowrap;
      }
      .folder-icon:hover {
        background: var(--cream3);
      }

      .tab {
        position: relative;
        padding: 7px 14px;
        border-radius: 10px 10px 0 0;
        cursor: grab;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        white-space: nowrap;
        user-select: none;
        transition: all 0.2s;
        border: 1.5px solid transparent;
        border-bottom: none;
        background: transparent;
        min-width: 60px;
        text-align: center;
        -webkit-tap-highlight-color: transparent;
      }
      .tab:active {
        cursor: grabbing;
      }
      .tab.dragging {
        opacity: 0.4;
        border: 1.5px dashed var(--brown-light);
      }

      .tab:hover {
        color: var(--text);
        background: var(--cream3);
      }

      .tab.active {
        background: var(--cream);
        color: var(--brown-dark);
        border-color: var(--border);
        border-bottom-color: var(--cream);
        margin-bottom: -1.5px;
        z-index: 1;
      }

      .tab .tab-color-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        margin-right: 5px;
        vertical-align: middle;
      }

      .add-tab-btn {
        padding: 7px 10px;
        font-size: 18px;
        color: var(--brown-light);
        cursor: pointer;
        border-radius: var(--radius-sm);
        transition: all 0.2s;
        user-select: none;
        flex-shrink: 0;
        line-height: 1;
      }
      .add-tab-btn:hover {
        color: var(--brown);
        background: var(--cream2);
      }

      /* === MAIN CONTENT === */
      .main {
        padding: 20px 16px 100px;
        max-width: 680px;
        margin: 0 auto;
      }

      .page {
        display: none;
      }
      .page.active {
        display: block;
      }

      /* === LIST HEADER === */
      .list-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .list-title {
        font-size: 22px;
        font-weight: 800;
        color: var(--brown-dark);
      }

      .list-subtitle {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .add-item-btn {
        background: var(--brown-dark);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .add-item-btn:hover {
        background: var(--brown);
        transform: translateY(-1px);
      }
      .add-item-btn:active {
        transform: scale(0.97);
      }

      /* === ADD FORM === */
      .add-form {
        background: white;
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        margin-bottom: 14px;
        display: none;
        box-shadow: 0 2px 12px var(--shadow);
      }
      .add-form.visible {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .add-form input {
        flex: 1;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 9px 13px;
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        background: var(--cream);
        outline: none;
        transition: border-color 0.2s;
      }
      .add-form input:focus {
        border-color: var(--brown-light);
        background: white;
      }
      .add-form input::placeholder {
        color: var(--text-muted);
      }

      .confirm-btn {
        background: var(--pink);
        color: white;
        border: none;
        border-radius: var(--radius-sm);
        padding: 9px 16px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }
      .confirm-btn:hover {
        background: #e8919e;
      }

      /* === TODO ITEMS === */
      .todo-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .todo-item {
        position: relative;
        overflow: hidden;
        border-radius: var(--radius);
        user-select: none;
      }

      .todo-inner {
        display: flex;
        align-items: center;
        gap: 12px;
        background: white;
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        transition:
          transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
          box-shadow 0.2s;
        position: relative;
        z-index: 1;
        will-change: transform;
      }

      .todo-item:hover .todo-inner {
        box-shadow: 0 3px 14px var(--shadow);
      }

      .delete-bg {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 80px;
        background: #ff6b6b;
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
        z-index: 0;
        cursor: pointer;
        transition: background 0.2s;
      }
      .delete-bg:hover {
        background: #ff4d4d;
      }

      /* === CHECKBOX === */
      .check-btn {
        width: 28px;
        height: 28px;
        border: 2px solid var(--border);
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0;
        flex-shrink: 0;
        transition: all 0.2s;
        background: white;
        position: relative;
        overflow: hidden;
      }
      .check-btn:hover {
        border-color: var(--brown-light);
        background: var(--cream);
      }

      @keyframes smileIn {
        0% {
          transform: scale(0) rotate(-20deg);
          opacity: 0;
        }
        60% {
          transform: scale(1.3) rotate(5deg);
          opacity: 1;
        }
        100% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      .check-btn .smile {
        font-size: 16px;
        display: none;
        animation: smileIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      .check-btn .checkmark {
        font-size: 14px;
        display: none;
        color: var(--green);
      }
      .check-btn .ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid var(--green);
        opacity: 0;
        transform: scale(1);
        pointer-events: none;
      }

      @keyframes ringPop {
        0% {
          transform: scale(1);
          opacity: 0.7;
        }
        100% {
          transform: scale(1.8);
          opacity: 0;
        }
      }

      .check-btn.smiling .smile {
        display: block;
      }
      .check-btn.smiling {
        border-color: var(--yellow);
        background: var(--yellow-light);
      }
      .check-btn.done {
        border-color: var(--green);
        background: var(--green-light);
      }
      .check-btn.done .checkmark {
        display: block;
      }
      .check-btn.done .ring {
        animation: ringPop 0.5s ease-out forwards;
      }

      .todo-text {
        flex: 1;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        line-height: 1.4;
        transition: all 0.3s;
      }

      .todo-item.done .todo-text {
        text-decoration: line-through;
        color: var(--text-muted);
        opacity: 0.7;
      }

      .empty-state {
        text-align: center;
        padding: 48px 20px;
        color: var(--text-muted);
      }
      .empty-state .empty-icon {
        font-size: 48px;
        margin-bottom: 12px;
        opacity: 0.5;
      }
      .empty-state p {
        font-size: 14px;
        font-weight: 600;
      }

      /* === CONTEXT MENU === */
      .ctx-menu {
        position: fixed;
        background: white;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        z-index: 999;
        overflow: hidden;
        min-width: 150px;
        display: none;
        animation: menuIn 0.15s ease-out;
      }
      @keyframes menuIn {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .ctx-menu.visible {
        display: block;
      }
      .ctx-item {
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: background 0.15s;
        color: var(--text);
      }
      .ctx-item:hover {
        background: var(--cream);
      }
      .ctx-item.danger {
        color: #e24b4a;
      }
      .ctx-item.danger:hover {
        background: #fcebeb;
      }

      /* === MODAL === */
      .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(91, 70, 56, 0.35);
        z-index: 500;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        backdrop-filter: blur(2px);
      }
      .modal-bg.visible {
        display: flex;
      }

      .modal {
        background: var(--cream);
        border-radius: var(--radius);
        padding: 24px;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        animation: modalIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes modalIn {
        from {
          transform: scale(0.85);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .modal h3 {
        font-size: 18px;
        font-weight: 800;
        margin-bottom: 16px;
        color: var(--brown-dark);
      }

      .modal input,
      .modal select {
        width: 100%;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 10px 13px;
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        background: white;
        outline: none;
        margin-bottom: 10px;
        transition: border-color 0.2s;
      }
      .modal input:focus,
      .modal select:focus {
        border-color: var(--brown-light);
      }

      .color-picker {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .color-swatch {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        cursor: pointer;
        border: 2.5px solid transparent;
        transition:
          transform 0.15s,
          border-color 0.15s;
        flex-shrink: 0;
      }
      .color-swatch:hover {
        transform: scale(1.15);
      }
      .color-swatch.selected {
        border-color: var(--brown-dark);
        transform: scale(1.1);
      }

      .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 6px;
      }
      .btn-ghost {
        background: none;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        color: var(--text-muted);
        transition: all 0.15s;
      }
      .btn-ghost:hover {
        background: var(--cream2);
        color: var(--text);
      }
      .btn-primary {
        background: var(--brown-dark);
        color: white;
        border: none;
        border-radius: var(--radius-sm);
        padding: 8px 20px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
      }
      .btn-primary:hover {
        background: var(--brown);
      }

      .progress-bar {
        height: 5px;
        background: var(--cream3);
        border-radius: 10px;
        margin-bottom: 16px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--green);
        border-radius: 10px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .confetti-piece {
        position: fixed;
        width: 8px;
        height: 8px;
        border-radius: 2px;
        pointer-events: none;
        z-index: 9999;
        animation: confettiFall 1.2s ease-in forwards;
      }
      @keyframes confettiFall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(60vh) rotate(720deg);
          opacity: 0;
        }
      }

      .swipe-hint {
        font-size: 11px;
        color: var(--text-muted);
        text-align: right;
        margin-bottom: 6px;
      }

      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--cream3);
        border-radius: 10px;
      }

      @media (max-width: 480px) {
        .main {
          padding: 16px 12px 100px;
        }
        .topbar {
          padding: 12px 12px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-title">
        <span class="title-dot"></span>
        <span id="topbarTitleText" contenteditable="true">我的計劃本</span>
      </div>
      <div class="tabs-wrap" id="tabsWrap">
        <div class="add-tab-btn" id="addTabBtn" title="新增分頁">＋</div>
      </div>
    </div>

    <div class="main" id="mainContent"></div>

    <div class="ctx-menu" id="ctxMenu">
      <div class="ctx-item" id="ctxRename">✏️ 重新命名</div>
      <div class="ctx-item" id="ctxMove">📁 移到資料夾</div>
      <div class="ctx-item danger" id="ctxDelete">🗑️ 刪除分頁</div>
    </div>

    <div class="ctx-menu" id="folderCtxMenu">
      <div class="ctx-item" id="ctxFolderRename">✏️ 重新命名資料夾</div>
      <div class="ctx-item danger" id="ctxFolderDelete">🗑️ 刪除資料夾</div>
    </div>

    <div class="modal-bg" id="tabModal">
      <div class="modal">
        <h3 id="modalTitle">新增分頁</h3>
        <input
          type="text"
          id="tabNameInput"
          placeholder="分頁名稱"
          maxlength="20"
        />
        <div
          style="
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
          "
        >
          選擇顏色
        </div>
        <div class="color-picker" id="colorPicker"></div>
        <div
          style="
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
          "
        >
          加入資料夾（選填）
        </div>
        <select id="folderSelect">
          <option value="">不加入資料夾</option>
        </select>
        <div class="modal-actions">
          <button class="btn-ghost" id="modalCancel">取消</button>
          <button class="btn-primary" id="modalConfirm">確認</button>
        </div>
      </div>
    </div>

    <div class="modal-bg" id="folderModal">
      <div class="modal">
        <h3 id="folderModalTitle">新增資料夾</h3>
        <input
          type="text"
          id="folderNameInput"
          placeholder="資料夾名稱"
          maxlength="20"
        />
        <div class="modal-actions">
          <button class="btn-ghost" id="folderCancel">取消</button>
          <button class="btn-primary" id="folderConfirm">確認</button>
        </div>
      </div>
    </div>

    <div class="modal-bg" id="moveModal">
      <div class="modal">
        <h3>移到資料夾</h3>
        <select id="moveFolderSelect">
          <option value="">不加入資料夾</option>
        </select>
        <div class="modal-actions">
          <button class="btn-ghost" id="moveCancelBtn">取消</button>
          <button class="btn-primary" id="moveConfirmBtn">確認</button>
        </div>
      </div>
    </div>

    <script>
      // ===================== STATE (狀態管理) =====================
      let state = {
        title: "我的計劃本",
        folders: [
          { id: "f1", name: "生活" },
          { id: "f2", name: "工作" },
        ],
        tabs: [
          {
            id: "t1",
            name: "今日待辦",
            color: "#F2A7B8",
            folderId: "f1",
            items: [
              { id: "i1", text: "喝 8 杯水 💧", done: false },
              { id: "i2", text: "讀書 30 分鐘 📖", done: false },
              { id: "i3", text: "整理房間 🧹", done: true },
            ],
          },
          {
            id: "t2",
            name: "購物清單",
            color: "#7BC8A4",
            folderId: "f1",
            items: [
              { id: "i4", text: "牛奶", done: false },
              { id: "i5", text: "蔬菜沙拉材料", done: false },
            ],
          },
          {
            id: "t3",
            name: "工作任務",
            color: "#A7C4E8",
            folderId: "f2",
            items: [
              { id: "i6", text: "完成週報", done: false },
              { id: "i7", text: "回覆 Email", done: true },
            ],
          },
        ],
        activeTab: "t1",
        nextId: 100,
      };

      const TAB_COLORS = [
        "#F2A7B8",
        "#7BC8A4",
        "#F7D98C",
        "#A7C4E8",
        "#C4A8E8",
        "#F2C4A8",
        "#A8E8D4",
        "#E8A7C4",
      ];

      // ===================== SAVE/LOAD =====================
      function saveState() {
        try {
          localStorage.setItem("plannerState", JSON.stringify(state));
        } catch (e) {}
      }
      function loadState() {
        try {
          const s = localStorage.getItem("plannerState");
          if (s) {
            state = JSON.parse(s);
            if (!state.title) state.title = "我的計劃本";
          }
        } catch (e) {}
      }

      // ===================== RENDER (畫面渲染) =====================
      function render() {
        const titleEl = document.getElementById("topbarTitleText");
        if (document.activeElement !== titleEl) {
          titleEl.textContent = state.title || "我的計劃本";
        }

        renderTabs();
        renderPages();
        saveState();
      }

      function renderTabs() {
        const wrap = document.getElementById("tabsWrap");
        const addBtn = document.getElementById("addTabBtn");

        wrap.querySelectorAll(".tab, .tab-group").forEach((el) => el.remove());

        const grouped = {};
        const ungrouped = [];
        state.tabs.forEach((tab) => {
          if (tab.folderId) {
            if (!grouped[tab.folderId]) grouped[tab.folderId] = [];
            grouped[tab.folderId].push(tab);
          } else {
            ungrouped.push(tab);
          }
        });

        ungrouped.forEach((tab) => {
          const el = makeTabEl(tab);
          wrap.insertBefore(el, addBtn);
        });

        state.folders.forEach((folder) => {
          const tabs = grouped[folder.id] || [];

          const group = document.createElement("div");
          group.className = "tab-group";
          group.setAttribute("data-folder", folder.id);

          group.addEventListener("dragover", (e) => {
            e.preventDefault();
            group.classList.add("dragover");
          });
          group.addEventListener("dragleave", () => {
            group.classList.remove("dragover");
          });
          group.addEventListener("drop", (e) => {
            e.preventDefault();
            group.classList.remove("dragover");
            const tabId = e.dataTransfer.getData("text/plain");
            const folderId = group.getAttribute("data-folder");

            const targetTab = state.tabs.find((t) => t.id === tabId);
            if (targetTab) {
              targetTab.folderId = folderId;
              render();
            }
          });

          // 【功能新增】資料夾標籤：顯示名字，並綁定右鍵/長按事件
          const fLabel = document.createElement("span");
          fLabel.className = "folder-icon";
          fLabel.textContent = `📁 ${folder.name}`;
          fLabel.title = "按右鍵/長按管理資料夾";

          // 綁定資料夾右鍵選單
          fLabel.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            showFolderCtxMenu(e, folder.id);
          });

          // 手機端長按資料夾機制
          let fTimer;
          fLabel.addEventListener(
            "touchstart",
            () => {
              fTimer = setTimeout(
                () => showFolderCtxMenu(null, folder.id, fLabel),
                600,
              );
            },
            { passive: true },
          );
          fLabel.addEventListener("touchend", () => clearTimeout(fTimer), {
            passive: true,
          });
          fLabel.addEventListener("touchmove", () => clearTimeout(fTimer), {
            passive: true,
          });

          group.appendChild(fLabel);

          tabs.forEach((tab) => {
            const el = makeTabEl(tab);
            group.appendChild(el);
          });
          wrap.insertBefore(group, addBtn);
        });
      }

      function makeTabEl(tab) {
        const el = document.createElement("div");
        el.className = "tab" + (state.activeTab === tab.id ? " active" : "");
        el.setAttribute("data-tabid", tab.id);
        el.innerHTML = `<span class="tab-color-dot" style="background:${tab.color}"></span>${tab.name}`;

        el.setAttribute("draggable", "true");
        el.addEventListener("dragstart", (e) => {
          e.dataTransfer.setData("text/plain", tab.id);
          el.classList.add("dragging");
        });
        el.addEventListener("dragend", () => {
          el.classList.remove("dragging");
          document
            .querySelectorAll(".tab-group")
            .forEach((g) => g.classList.remove("dragover"));
        });

        el.addEventListener("click", () => {
          state.activeTab = tab.id;
          render();
        });
        el.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          showCtxMenu(e, tab.id);
        });

        let pressTimer;
        el.addEventListener(
          "touchstart",
          () => {
            pressTimer = setTimeout(() => showCtxMenu(null, tab.id, el), 600);
          },
          { passive: true },
        );
        el.addEventListener("touchend", () => clearTimeout(pressTimer), {
          passive: true,
        });
        el.addEventListener("touchmove", () => clearTimeout(pressTimer), {
          passive: true,
        });

        return el;
      }

      function renderPages() {
        const main = document.getElementById("mainContent");
        main.innerHTML = "";
        state.tabs.forEach((tab) => {
          const page = document.createElement("div");
          page.className =
            "page" + (state.activeTab === tab.id ? " active" : "");
          page.setAttribute("data-page", tab.id);
          page.innerHTML = buildPageHTML(tab);
          main.appendChild(page);
          attachPageEvents(page, tab);
        });
      }

      function buildPageHTML(tab) {
        const done = tab.items.filter((i) => i.done).length;
        const total = tab.items.length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        const folderName = tab.folderId
          ? (state.folders.find((f) => f.id === tab.folderId) || {}).name
          : null;

        return `
          <div class="list-header">
            <div>
              ${folderName ? `<div style="font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:2px;">📁 ${folderName}</div>` : ""}
              <div class="list-title">${tab.name}</div>
              <div class="list-subtitle">${total ? `${done}/${total} 完成 · ${pct}%` : "還沒有任何項目"}</div>
            </div>
            <button class="add-item-btn" data-additem="${tab.id}">＋ 新增</button>
          </div>
          ${total ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>` : ""}
          <div class="add-form" id="addForm_${tab.id}">
            <input type="text" placeholder="輸入內容…" id="addInput_${tab.id}" maxlength="60" />
            <button class="confirm-btn" data-confirmitem="${tab.id}">加入</button>
          </div>
          ${total ? `<div class="swipe-hint">← 左滑項目露出垃圾桶點擊刪除</div>` : ""}
          <div class="todo-list" id="list_${tab.id}">
            ${tab.items.map((item) => buildItemHTML(item)).join("")}
          </div>
          ${total === 0 ? `<div class="empty-state"><div class="empty-icon">🌸</div><p>加入第一個計劃吧！</p></div>` : ""}
        `;
      }

      function buildItemHTML(item) {
        return `
          <div class="todo-item${item.done ? " done" : ""}" data-item="${item.id}">
            <div class="delete-bg">🗑️</div>
            <div class="todo-inner">
              <div class="check-btn${item.done ? " done" : ""}" data-check="${item.id}">
                <span class="smile">😊</span>
                <span class="checkmark">✓</span>
                <div class="ring"></div>
              </div>
              <div class="todo-text">${escHtml(item.text)}</div>
            </div>
          </div>
        `;
      }

      function attachPageEvents(page, tab) {
        if (page.querySelector(`[data-additem="${tab.id}"]`))
          page
            .querySelector(`[data-additem="${tab.id}"]`)
            .addEventListener("click", () => toggleAddForm(tab.id));

        if (page.querySelector(`[data-confirmitem="${tab.id}"]`))
          page
            .querySelector(`[data-confirmitem="${tab.id}"]`)
            .addEventListener("click", () => addItem(tab.id));

        const input = page.querySelector(`#addInput_${tab.id}`);
        if (input)
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") addItem(tab.id);
          });

        attachItemEvents(page, tab);
      }

      function attachItemEvents(page, tab) {
        page.querySelectorAll(".check-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleItem(btn.getAttribute("data-check"), tab.id, btn);
          });
        });

        page.querySelectorAll(".delete-bg").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const itemId = btn.closest(".todo-item").getAttribute("data-item");
            deleteItem(itemId, tab.id);
          });
        });

        page.querySelectorAll(".todo-item").forEach((el) => {
          attachSwipe(el, tab.id);
        });
      }

      // ===================== SWIPE TO DELETE =====================
      function attachSwipe(el, tabId) {
        const inner = el.querySelector(".todo-inner");
        let startX = 0,
          curX = 0,
          dragging = false,
          revealed = false;

        function onStart(x) {
          startX = x;
          curX = x;
          dragging = true;
        }
        function onMove(x) {
          if (!dragging) return;
          curX = x;
          let dx = curX - startX;
          if (revealed) dx -= 80;

          const finalX = Math.max(-100, Math.min(0, dx));
          inner.style.transition = "none";
          inner.style.transform = `translateX(${finalX}px)`;
        }
        function onEnd() {
          if (!dragging) return;
          dragging = false;
          inner.style.transition =
            "transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)";

          const dx = curX - startX;
          if (dx < -40) {
            inner.style.transform = "translateX(-80px)";
            revealed = true;
          } else {
            inner.style.transform = "translateX(0)";
            revealed = false;
          }
        }

        el.addEventListener(
          "touchstart",
          (e) => onStart(e.touches[0].clientX),
          { passive: true },
        );
        el.addEventListener(
          "touchmove",
          (e) => {
            if (dragging) onMove(e.touches[0].clientX);
          },
          { passive: true },
        );
        el.addEventListener("touchend", () => onEnd());

        inner.addEventListener("mousedown", (e) => {
          if (e.button === 0) onStart(e.clientX);
        });
        window.addEventListener("mousemove", (e) => {
          if (dragging) onMove(e.clientX);
        });
        window.addEventListener("mouseup", () => onEnd());

        inner.addEventListener(
          "click",
          (e) => {
            if (revealed) {
              e.preventDefault();
              e.stopPropagation();
              inner.style.transform = "translateX(0)";
              revealed = false;
            }
          },
          { capture: true },
        );
      }

      // ===================== ACTIONS =====================
      function toggleAddForm(tabId) {
        const form = document.getElementById(`addForm_${tabId}`);
        if (!form) return;
        const visible = form.classList.toggle("visible");
        if (visible) {
          const input = document.getElementById(`addInput_${tabId}`);
          if (input) setTimeout(() => input.focus(), 50);
        }
      }

      function addItem(tabId) {
        const input = document.getElementById(`addInput_${tabId}`);
        if (!input || !input.value.trim()) return;
        const text = input.value.trim();
        const tab = state.tabs.find((t) => t.id === tabId);
        if (!tab) return;
        tab.items.push({ id: "i" + ++state.nextId, text, done: false });
        input.value = "";
        render();
      }

      function toggleItem(itemId, tabId, btnEl) {
        const tab = state.tabs.find((t) => t.id === tabId);
        if (!tab) return;
        const item = tab.items.find((i) => i.id === itemId);
        if (!item) return;

        if (!item.done) {
          btnEl.classList.add("smiling");
          btnEl.querySelector(".smile").style.display = "block";
          setTimeout(() => {
            btnEl.classList.remove("smiling");
            btnEl.querySelector(".smile").style.display = "none";
            item.done = true;
            btnEl.classList.add("done");
            btnEl.querySelector(".checkmark").style.display = "block";
            btnEl.querySelector(".ring").style.animation =
              "ringPop 0.5s ease-out forwards";

            const itemEl = btnEl.closest(".todo-item");
            if (itemEl) itemEl.classList.add("done");
            spawnConfetti(btnEl.getBoundingClientRect());
            updateProgress(tabId);
            saveState();
          }, 600);
        } else {
          item.done = false;
          btnEl.classList.remove("done");
          btnEl.querySelector(".checkmark").style.display = "none";
          btnEl.querySelector(".ring").style.animation = "none";
          const itemEl = btnEl.closest(".todo-item");
          if (itemEl) itemEl.classList.remove("done");
          updateProgress(tabId);
          saveState();
        }
      }

      function updateProgress(tabId) {
        const tab = state.tabs.find((t) => t.id === tabId);
        if (!tab) return;
        const done = tab.items.filter((i) => i.done).length;
        const total = tab.items.length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        const fill = document.querySelector(
          `[data-page="${tabId}"] .progress-fill`,
        );
        if (fill) fill.style.width = pct + "%";
        const subtitle = document.querySelector(
          `[data-page="${tabId}"] .list-subtitle`,
        );
        if (subtitle) subtitle.textContent = `${done}/${total} 完成 · ${pct}%`;
      }

      function deleteItem(itemId, tabId) {
        const tab = state.tabs.find((t) => t.id === tabId);
        if (!tab) return;
        tab.items = tab.items.filter((i) => i.id !== itemId);
        render();
      }

      function spawnConfetti(rect) {
        const colors = ["#F2A7B8", "#7BC8A4", "#F7D98C", "#A7C4E8", "#C4A8E8"];
        for (let i = 0; i < 10; i++) {
          const el = document.createElement("div");
          el.className = "confetti-piece";
          el.style.cssText = `
            left: ${rect.left + rect.width / 2 + (Math.random() - 0.5) * 60}px;
            top: ${rect.top}px;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            border-radius: ${Math.random() > 0.5 ? "50%" : "2px"};
            width: ${6 + Math.random() * 6}px;
            height: ${6 + Math.random() * 6}px;
            animation-delay: ${Math.random() * 0.3}s;
            animation-duration: ${0.8 + Math.random() * 0.6}s;
          `;
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 1500);
        }
      }

      // ===================== CONTEXT MENU (選單) =====================
      let ctxTabId = null;
      let ctxFolderId = null; // 【新增】追蹤目前正在點擊哪一個資料夾的 ID

      function showCtxMenu(e, tabId, fromEl) {
        ctxTabId = tabId;
        const menu = document.getElementById("ctxMenu");
        menu.classList.add("visible");
        if (e) {
          let x = e.clientX,
            y = e.clientY;
          if (x + 160 > window.innerWidth) x = window.innerWidth - 165;
          if (y + 140 > window.innerHeight) y = window.innerHeight - 145;
          menu.style.left = x + "px";
          menu.style.top = y + "px";
        } else if (fromEl) {
          const r = fromEl.getBoundingClientRect();
          menu.style.left = r.left + "px";
          menu.style.top = r.bottom + 4 + "px";
        }
      }

      // 【功能新增】顯示資料夾專屬右鍵選單的函式
      function showFolderCtxMenu(e, folderId, fromEl) {
        ctxFolderId = folderId;
        const menu = document.getElementById("folderCtxMenu");
        menu.classList.add("visible");
        if (e) {
          let x = e.clientX,
            y = e.clientY;
          if (x + 160 > window.innerWidth) x = window.innerWidth - 165;
          if (y + 140 > window.innerHeight) y = window.innerHeight - 145;
          menu.style.left = x + "px";
          menu.style.top = y + "px";
        } else if (fromEl) {
          const r = fromEl.getBoundingClientRect();
          menu.style.left = r.left + "px";
          menu.style.top = r.bottom + 4 + "px";
        }
      }

      function hideCtxMenu() {
        document.getElementById("ctxMenu").classList.remove("visible");
        document.getElementById("folderCtxMenu").classList.remove("visible"); // 同步收回資料夾選單
      }

      document.getElementById("ctxDelete").addEventListener("click", () => {
        if (!ctxTabId) return;
        state.tabs = state.tabs.filter((t) => t.id !== ctxTabId);
        if (state.activeTab === ctxTabId)
          state.activeTab = state.tabs[0]?.id || null;
        hideCtxMenu();
        render();
      });

      document.getElementById("ctxRename").addEventListener("click", () => {
        if (!ctxTabId) return;
        const tab = state.tabs.find((t) => t.id === ctxTabId);
        if (!tab) return;
        hideCtxMenu();
        openTabModal(tab);
      });

      document.getElementById("ctxMove").addEventListener("click", () => {
        if (!ctxTabId) return;
        hideCtxMenu();
        openMoveModal(ctxTabId);
      });

      // --- 【功能新增】資料夾右鍵選單點擊事件處理 ---

      // 1. 資料夾重新命名
      document
        .getElementById("ctxFolderRename")
        .addEventListener("click", () => {
          if (!ctxFolderId) return;
          const folder = state.folders.find((f) => f.id === ctxFolderId);
          if (!folder) return;
          hideCtxMenu();

          // 進入編輯模式：設定暫存變數，並複用原有的 folderModal
          editingFolderId = folder.id;
          document.getElementById("folderModalTitle").textContent =
            "編輯資料夾";
          document.getElementById("folderNameInput").value = folder.name;
          document.getElementById("folderModal").classList.add("visible");
          setTimeout(
            () => document.getElementById("folderNameInput").focus(),
            100,
          );
        });

      // 2. 刪除資料夾
      document
        .getElementById("ctxFolderDelete")
        .addEventListener("click", () => {
          if (!ctxFolderId) return;
          const folder = state.folders.find((f) => f.id === ctxFolderId);
          if (!folder) return;
          hideCtxMenu();

          if (
            confirm(
              `確定要刪除「${folder.name}」資料夾嗎？\n（資料夾內的分頁將自動移至外層，計畫內容不會遺失喔！）`,
            )
          ) {
            // A. 從資料夾陣列中移除
            state.folders = state.folders.filter((f) => f.id !== ctxFolderId);
            // B. 安全解耦：把原本屬於該資料夾的分頁 folderId 清空
            state.tabs.forEach((tab) => {
              if (tab.folderId === ctxFolderId) tab.folderId = null;
            });
            render();
          }
        });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".ctx-menu")) hideCtxMenu();
      });

      // ===================== MODAL WINDOWS =====================
      let editingTabId = null;
      let editingFolderId = null; // 【新增】用來儲存當前正在編輯的資料夾 ID
      let selectedColor = TAB_COLORS[0];

      function openTabModal(existingTab) {
        editingTabId = existingTab ? existingTab.id : null;
        selectedColor = existingTab ? existingTab.color : TAB_COLORS[0];

        document.getElementById("modalTitle").textContent = existingTab
          ? "編輯分頁"
          : "新增分頁";
        document.getElementById("tabNameInput").value = existingTab
          ? existingTab.name
          : "";

        const cp = document.getElementById("colorPicker");
        cp.innerHTML = "";
        TAB_COLORS.forEach((c) => {
          const sw = document.createElement("div");
          sw.className =
            "color-swatch" + (c === selectedColor ? " selected" : "");
          sw.style.background = c;
          sw.addEventListener("click", () => {
            selectedColor = c;
            cp.querySelectorAll(".color-swatch").forEach((s) =>
              s.classList.remove("selected"),
            );
            sw.classList.add("selected");
          });
          cp.appendChild(sw);
        });

        const fs = document.getElementById("folderSelect");
        fs.innerHTML = '<option value="">不加入資料夾</option>';
        state.folders.forEach((f) => {
          const opt = document.createElement("option");
          opt.value = f.id;
          opt.textContent = f.name;
          if (existingTab && existingTab.folderId === f.id) opt.selected = true;
          fs.appendChild(opt);
        });

        const newOpt = document.createElement("option");
        newOpt.value = "__new__";
        newOpt.textContent = "＋ 新增資料夾…";
        fs.appendChild(newOpt);

        fs.addEventListener("change", function handler() {
          if (fs.value === "__new__") {
            fs.removeEventListener("change", handler);
            hideTabModal();
            openFolderModal(() => {
              openTabModal(existingTab);
            });
          }
        });

        document.getElementById("tabModal").classList.add("visible");
        setTimeout(() => document.getElementById("tabNameInput").focus(), 100);
      }

      function hideTabModal() {
        document.getElementById("tabModal").classList.remove("visible");
      }

      document
        .getElementById("addTabBtn")
        .addEventListener("click", () => openTabModal(null));
      document
        .getElementById("modalCancel")
        .addEventListener("click", hideTabModal);

      document.getElementById("modalConfirm").addEventListener("click", () => {
        const name = document.getElementById("tabNameInput").value.trim();
        if (!name) {
          document.getElementById("tabNameInput").focus();
          return;
        }
        const folderId = document.getElementById("folderSelect").value || null;

        if (editingTabId) {
          const tab = state.tabs.find((t) => t.id === editingTabId);
          if (tab) {
            tab.name = name;
            tab.color = selectedColor;
            tab.folderId = folderId === "__new__" ? null : folderId;
          }
        } else {
          state.tabs.push({
            id: "t" + ++state.nextId,
            name,
            color: selectedColor,
            folderId: folderId === "__new__" ? null : folderId,
            items: [],
          });
          state.activeTab = state.tabs[state.tabs.length - 1].id;
        }
        hideTabModal();
        render();
      });

      document
        .getElementById("tabNameInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter")
            document.getElementById("modalConfirm").click();
        });

      let folderCallback = null;
      function openFolderModal(cb) {
        folderCallback = cb;
        editingFolderId = null; // 確保是新增模式
        document.getElementById("folderModalTitle").textContent = "新增資料夾";
        document.getElementById("folderNameInput").value = "";
        document.getElementById("folderModal").classList.add("visible");
        setTimeout(
          () => document.getElementById("folderNameInput").focus(),
          100,
        );
      }

      document.getElementById("folderCancel").addEventListener("click", () => {
        document.getElementById("folderModal").classList.remove("visible");
        editingFolderId = null;
        if (folderCallback) {
          folderCallback();
          folderCallback = null;
        }
      });

      // 【修改點】讓確認鍵同時支援「新增模式」與「編輯模式」的判斷
      document.getElementById("folderConfirm").addEventListener("click", () => {
        const name = document.getElementById("folderNameInput").value.trim();
        if (!name) {
          document.getElementById("folderNameInput").focus();
          return;
        }

        if (editingFolderId) {
          // 💡 編輯模式：更新現有資料夾名稱
          const folder = state.folders.find((f) => f.id === editingFolderId);
          if (folder) folder.name = name;
          editingFolderId = null; // 清空狀態
        } else {
          // 💡 新增模式：推入新資料
          const id = "f" + ++state.nextId;
          state.folders.push({ id, name });

          if (folderCallback) {
            document.getElementById("folderModal").classList.remove("visible");
            folderCallback();
            setTimeout(() => {
              const fs = document.getElementById("folderSelect");
              if (fs) {
                const opt = document.createElement("option");
                opt.value = id;
                opt.textContent = name;
                opt.selected = true;
                const newOpt = Array.from(fs.options).find(
                  (o) => o.value === "__new__",
                );
                fs.insertBefore(opt, newOpt);
                fs.value = id;
              }
            }, 50);
            folderCallback = null;
            return;
          }
        }

        document.getElementById("folderModal").classList.remove("visible");
        render();
      });

      document
        .getElementById("folderNameInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter")
            document.getElementById("folderConfirm").click();
        });

      let moveTabId = null;
      function openMoveModal(tabId) {
        moveTabId = tabId;
        const tab = state.tabs.find((t) => t.id === tabId);
        const sel = document.getElementById("moveFolderSelect");
        sel.innerHTML = '<option value="">不加入資料夾</option>';
        state.folders.forEach((f) => {
          const opt = document.createElement("option");
          opt.value = f.id;
          opt.textContent = f.name;
          if (tab && tab.folderId === f.id) opt.selected = true;
          sel.appendChild(opt);
        });
        document.getElementById("moveModal").classList.add("visible");
      }

      document.getElementById("moveCancelBtn").addEventListener("click", () => {
        document.getElementById("moveModal").classList.remove("visible");
      });

      document
        .getElementById("moveConfirmBtn")
        .addEventListener("click", () => {
          const folderId =
            document.getElementById("moveFolderSelect").value || null;
          const tab = state.tabs.find((t) => t.id === moveTabId);
          if (tab) tab.folderId = folderId;
          document.getElementById("moveModal").classList.remove("visible");
          render();
        });

      document.querySelectorAll(".modal-bg").forEach((bg) => {
        bg.addEventListener("click", (e) => {
          if (e.target === bg) {
            bg.classList.remove("visible");
            editingFolderId = null;
          }
        });
      });

      // ===================== HELPERS =====================
      function escHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ===================== INITIALIZATION =====================
      loadState();
      if (!state.activeTab && state.tabs.length)
        state.activeTab = state.tabs[0].id;

      const titleTextEl = document.getElementById("topbarTitleText");
      titleTextEl.addEventListener("blur", () => {
        const newTitle = titleTextEl.textContent.trim();
        state.title = newTitle || "我的計劃本";
        saveState();
      });

      titleTextEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          titleTextEl.blur();
        }
      });

      const tabsWrapEl = document.getElementById("tabsWrap");
      tabsWrapEl.addEventListener("dragover", (e) => {
        e.preventDefault();
      });
      tabsWrapEl.addEventListener("drop", (e) => {
        if (!e.target.closest(".tab-group")) {
          e.preventDefault();
          const tabId = e.dataTransfer.getData("text/plain");
          const targetTab = state.tabs.find((t) => t.id === tabId);
          if (targetTab) {
            targetTab.folderId = null;
            render();
          }
        }
      });

      render();
    </script>
  </body>
</html>
