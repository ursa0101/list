<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>✨ 我的計劃本（多房間與資料夾協作版）</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase, ref, set, get, update, remove,
      onValue, onChildAdded, onChildChanged, onChildRemoved,
      push, serverTimestamp, onDisconnect
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    /* ══════════════════════════════════════════════
       🔥 請填入你的 Firebase 設定
    ══════════════════════════════════════════════ */
    const firebaseConfig = {
      apiKey: "AIzaSyBO3BaSLWDB1DA6znk6kdo7MTN5kW56AWQ",
      authDomain: "my-travel-planner-3c04a.firebaseapp.com",
      databaseURL: "https://my-travel-planner-3c04a-default-rtdb.firebaseio.com",
      projectId: "my-travel-planner-3c04a",
      storageBucket: "my-travel-planner-3c04a.appspot.com",
      messagingSenderId: "594711823179",
      appId: "1:594711823179:web:a07409249767fb8084a9e5"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
    window.fbDB = db;
    window.fbRefs = { ref, set, get, update, remove, onValue, onChildAdded, onChildChanged, onChildRemoved, push, serverTimestamp, onDisconnect };
  </script>

  <style>
    /* ══════════════════════════════════════════════
       🎨 全域核心樣式與變數 (保留 index (2) 優良底層)
    ══════════════════════════════════════════════ */
    :root {
      --cream: #faf7f2;
      --cream2: #f4efe6;
      --cream3: #ede6d8;
      --brown-light: #c4a882;
      --brown: #9b7b5a;
      --brown-dark: #6b5240;
      --pink: #f2a7b8;
      --pink-light: #fce8ee;
      --green: #7bc8a4;
      --green-light: #e8f7f0;
      --yellow: #f7d98c;
      --yellow-light: #fef7e5;
      --shadow-sm: 0 4px 10px rgba(107,82,64,0.05);
      --shadow-md: 0 8px 20px rgba(107,82,64,0.08);
      --font-main: 'Nunito', 'Zen Maru Gothic', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--cream);
      color: var(--brown-dark);
      font-family: var(--font-main);
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* 門戶系統通用卡片 */
    .gate-card {
      background: #ffffff;
      border: 3px solid var(--cream3);
      border-radius: 32px;
      padding: 35px 25px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
      text-align: center;
      margin-top: 40px;
      animation: floatIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
    }
    @keyframes floatIn {
      0% { opacity:0; transform: translateY(30px) scale(0.95); }
      100% { opacity:1; transform: translateY(0) scale(1); }
    }

    h1.title {
      font-size: 28px;
      color: var(--brown-dark);
      font-weight: 800;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--brown-light);
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .form-group { text-align: left; margin-bottom: 18px; width: 100%; }
    .form-group label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      color: var(--brown);
      margin-bottom: 6px;
      padding-left: 4px;
    }
    .input-field {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--cream3);
      border-radius: 16px;
      font-family: var(--font-main);
      font-size: 15px;
      font-weight: 600;
      color: var(--brown-dark);
      background-color: var(--cream);
      outline: none;
      transition: all 0.25s;
    }
    .input-field:focus {
      border-color: var(--brown-light);
      background-color: #fff;
      box-shadow: 0 0 0 4px var(--pink-light);
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--brown);
      color: #ffffff;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-main);
      cursor: pointer;
      box-shadow: 0 6px 0 var(--brown-dark), 0 8px 15px rgba(107,82,64,0.2);
      transition: all 0.15s ease;
      margin-top: 10px;
    }
    .btn-primary:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 var(--brown-dark), 0 4px 8px rgba(107,82,64,0.2);
    }
    .btn-secondary {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--brown);
      border: 2px solid var(--cream3);
      border-radius: 18px;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-main);
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: var(--cream2); }

    .divider {
      margin: 25px 0;
      position: relative;
      text-align: center;
    }
    .divider::before {
      content: ""; position: absolute; left: 0; top: 50%; width: 100%; height: 2px; background: var(--cream3); z-index: 1;
    }
    .divider span {
      position: relative; z-index: 2; background: #ffffff; padding: 0 15px; font-size: 13px; color: var(--brown-light); font-weight: 600;
    }

    .screen { display: none; width: 100%; max-width: 480px; }
    .screen.visible { display: block; }

    /* ══════════════════════════════════════════════
       📁 資料夾與分頁橫列專用樣式 (完美移植自 index.html)
    ══════════════════════════════════════════════ */
    .folder-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 4px;
      scrollbar-width: none;
    }
    .folder-row::-webkit-scrollbar { display: none; }
    
    .folder-tab {
      background: #ffffff;
      border: 2px solid var(--cream3);
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: 700;
      color: var(--brown);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      box-shadow: 0 4px 6px rgba(155,123,90,0.05);
    }
    .folder-tab.active {
      background: var(--brown);
      border-color: var(--brown);
      color: #ffffff;
      box-shadow: 0 6px 12px rgba(155,123,90,0.25);
      transform: translateY(-2px);
    }
    .folder-tab .folder-del-btn {
      margin-left: 6px;
      font-size: 12px;
      color: var(--brown-light);
      transition: color 0.2s;
    }
    .folder-tab.active .folder-del-btn {
      color: rgba(255,255,255,0.7);
    }
    .folder-tab .folder-del-btn:hover {
      color: var(--pink) !important;
    }
    .folder-tab-add {
      background: var(--cream2);
      border: 2px dashed var(--brown-light);
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 700;
      color: var(--brown);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .folder-tab-add:hover {
      background: var(--cream3);
      transform: scale(1.02);
    }

    .tabs-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 5px 4px 0;
      border-bottom: 3px solid var(--cream2);
      margin-bottom: 20px;
      align-items: flex-end;
      scrollbar-width: none;
    }
    .tabs-row::-webkit-scrollbar { display: none; }
    
    .tab-item {
      padding: 10px 20px;
      font-weight: 700;
      color: var(--brown-light);
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
      white-space: nowrap;
      background: transparent;
      border-radius: 14px 14px 0 0;
      border: 2px solid transparent;
      border-bottom: none;
      margin-bottom: -3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab-item:hover { color: var(--brown); }
    .tab-item.active {
      color: var(--brown-dark);
      background: var(--cream);
      border-color: var(--cream2);
      border-bottom: 3px solid var(--cream);
    }
    .tab-item .tab-del-btn {
      font-size: 11px;
      color: var(--brown-light);
      margin-left: 4px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .tab-item:hover .tab-del-btn { opacity: 1; }
    .tab-item .tab-del-btn:hover { color: var(--pink); }
    
    .tab-item-add {
      padding: 6px 14px;
      font-weight: 700;
      color: var(--pink);
      cursor: pointer;
      background: var(--pink-light);
      border-radius: 20px;
      border: none;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      white-space: nowrap;
      margin-bottom: 6px;
      margin-left: auto;
      transition: all 0.2s;
    }
    .tab-item-add:hover {
      background: var(--pink);
      color: #fff;
      transform: scale(1.03);
    }

    /* ══════════════════════════════════════════════
       🏠 主畫面板塊與主要內容元件
    ══════════════════════════════════════════════ */
    .app-card {
      background: #ffffff;
      border: 3px solid var(--cream3);
      border-radius: 28px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
    }
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .room-title-area { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .room-title-area h2 { font-size: 20px; font-weight: 800; color: var(--brown-dark); }
    .info-icon { font-size: 16px; color: var(--brown-light); }

    .sync-status { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--brown-light); }
    .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }
    .status-dot.pending { background: var(--yellow); animation: blink 1s infinite alternate; }
    .status-dot.offline { background: var(--pink); }
    @keyframes blink { 0% { opacity: 0.4; } 100% { opacity: 1; } }

    /* 線上使用者頭像列 */
    .users-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 15px; }
    .user-avatar {
      padding: 4px 10px; background: var(--cream2); border-radius: 12px; font-size: 12px; font-weight: 700; color: var(--brown); white-space: nowrap; border: 1px solid var(--cream3);
    }

    /* 待辦事項清單 */
    .section-title { font-size: 16px; font-weight: 800; color: var(--brown-dark); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .todo-item {
      display: flex; align-items: center; padding: 12px; background: var(--cream); border-radius: 14px; margin-bottom: 8px; border: 2px solid transparent; transition: all 0.2s;
    }
    .todo-item.done { opacity: 0.6; background: var(--cream2); }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--brown-light); }
    .todo-checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--brown-light); margin-right: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; background: #fff; }
    .todo-item.done .todo-checkbox { background: var(--green); border-color: var(--green); }
    .todo-text { flex: 1; font-weight: 600; font-size: 15px; color: var(--brown-dark); outline: none; }
    .todo-del { color: var(--brown-light); cursor: pointer; padding: 2px 6px; font-size: 14px; }
    .todo-del:hover { color: var(--pink); }

    .add-box { display: flex; gap: 8px; margin-top: 12px; }
    .add-box input { flex: 1; padding: 10px 14px; border: 2px solid var(--cream3); border-radius: 12px; font-family: var(--font-main); font-weight: 600; outline: none; background: var(--cream); }
    .add-box input:focus { border-color: var(--brown-light); background: #fff; }
    .add-box button { padding: 0 16px; background: var(--brown); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-family: var(--font-main); cursor: pointer; }

    /* 隨手貼 (Sticky Notes) */
    .notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sticky-note {
      background: var(--yellow-light); border: 2px solid var(--yellow); border-radius: 16px; padding: 12px; min-height: 100px; display: flex; flex-direction: column; position: relative; box-shadow: var(--shadow-sm);
    }
    .sticky-note textarea {
      flex: 1; background: transparent; border: none; outline: none; resize: none; font-family: var(--font-main); font-weight: 600; font-size: 14px; color: var(--brown-dark); line-height: 1.4;
    }
    .sticky-note .note-del { position: absolute; right: 8px; top: 8px; font-size: 12px; color: var(--brown-light); cursor: pointer; opacity: 0; transition: opacity 0.2s; }
    .sticky-note:hover .note-del { opacity: 1; }

    /* 聊天室區塊 */
    .chat-container { display: flex; flex-direction: column; height: 260px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 5px; display: flex; flex-direction: column; gap: 8px; }
    .chat-msg { max-width: 80%; padding: 8px 12px; border-radius: 14px; font-size: 14px; font-weight: 600; line-height: 1.4; word-break: break-all; }
    .chat-msg.me { background: var(--brown); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .chat-msg.other { background: var(--cream); color: var(--brown-dark); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--cream3); }
    .chat-msg .msg-user { font-size: 10px; font-weight: 700; margin-bottom: 2px; opacity: 0.8; }

    /* 倒數計時器 */
    .timer-display { font-size: 32px; font-weight: 800; color: var(--brown-dark); text-align: center; margin: 10px 0; font-variant-numeric: tabular-nums; }
    .timer-controls { display: flex; justify-content: center; gap: 8px; }
    .btn-sm { padding: 6px 14px; background: var(--cream2); border: 2px solid var(--cream3); border-radius: 10px; font-family: var(--font-main); font-weight: 700; font-size: 13px; color: var(--brown); cursor: pointer; }
    .btn-sm.active { background: var(--pink-light); border-color: var(--pink); color: var(--pink); }

    /* 彈出視窗 (Modal) */
    .modal-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(107,82,64,0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 999; opacity:0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.visible { opacity:1; pointer-events: auto; }
    .modal-box {
      background: #fff; border: 3px solid var(--cream3); border-radius: 24px; padding: 25px; width: 90%; max-width: 360px; text-align: center; box-shadow: var(--shadow-md);
    }
    .modal-box h3 { font-size: 18px; font-weight: 800; color: var(--brown-dark); margin-bottom: 12px; }
    .room-code-tag { background: var(--cream); border: 2px dashed var(--brown-light); padding: 10px; border-radius: 12px; font-size: 18px; font-weight: 800; color: var(--brown-dark); margin: 15px 0; letter-spacing: 1px; }

    /* 滿意度特效 */
    .pop-effect { animation: pop 0.3s ease-out; }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <div class="screen visible" id="loginScreen">
    <div class="gate-card">
      <h1 class="title">✨ 我的計劃本</h1>
      <div class="subtitle">歡迎來到多人同步協作計劃本！請先註冊或登入您的專屬帳號。</div>
      
      <div class="form-group">
        <label>帳號 (電子信箱格式)</label>
        <input type="email" id="loginEmail" class="input-field" placeholder="example@gmail.com" />
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="loginPassword" class="input-field" placeholder="請輸入密碼" />
      </div>

      <button class="btn-primary" onclick="app.handleAuth('login')">安全登入 🚀</button>
      <button class="btn-secondary" onclick="app.handleAuth('register')">註冊新帳號</button>
    </div>
  </div>

  <div class="screen" id="roomScreen">
    <div class="gate-card">
      <h1 class="title">🏠 選擇計劃房間</h1>
      <div class="subtitle" id="userGreeting">哈囉！請建立一個新房間，或輸入好友的邀請碼加入。</div>

      <div class="form-group">
        <label>建立全新房間</label>
        <input type="text" id="newRoomName" class="input-field" placeholder="例如：我的東京自由行" />
        <button class="btn-primary" onclick="app.handleCreateRoom()" style="margin-top: 8px; padding: 10px;">✨ 創立新計畫</button>
      </div>

      <div class="divider"><span>或者</span></div>

      <div class="form-group">
        <label>輸入現有邀請碼</label>
        <input type="text" id="joinRoomId" class="input-field" placeholder="請輸入 8 碼英文數字邀請碼" style="text-transform: uppercase;" />
        <button class="btn-secondary" onclick="app.handleJoinRoom()" style="margin-top: 8px; padding: 10px; width: 100%;">加入現有房間 🔗</button>
      </div>

      <button class="btn-secondary" onclick="app.handleLogout()" style="margin-top: 20px; border-color: var(--pink); color: var(--pink);">登出帳號</button>
    </div>
  </div>

  <div class="screen" id="appScreen">
    
    <div class="app-card" style="padding: 12px 20px; margin-bottom: 12px;">
      <div class="app-header">
        <div class="room-title-area" onclick="app.showRoomInfo()">
          <h2 id="roomTitleName">載入中...</h2>
          <span class="info-icon">ℹ️</span>
        </div>
        <div class="sync-status">
          <div class="status-dot" id="onlineIndicator"></div>
          <span id="syncText">雲端同步中</span>
        </div>
      </div>
      <div class="users-bar" id="usersBar"></div>
    </div>

    <div class="folder-row" id="foldersStrip"></div>

    <div id="tabsSection" style="margin-top: 5px;">
      <div class="tabs-row" id="tabsStrip"></div>
    </div>

    <div class="app-card">
      <div class="section-title">📌 核心計畫清單</div>
      <div id="todoList"></div>
      <div class="add-box">
        <input type="text" id="newTodoText" placeholder="填寫新任務..." onkeydown="if(event.key==='Enter') app.addTodo()" />
        <button onclick="app.addTodo()">新增</button>
      </div>
    </div>

    <div class="app-card">
      <div class="section-title">💡 靈感隨手貼</div>
      <div class="notes-grid" id="notesGrid"></div>
      <button class="btn-secondary" onclick="app.addNote()" style="margin-top: 10px; padding: 8px;">＋ 新增隨手貼靈感</button>
    </div>

    <div class="app-card">
      <div class="section-title">⏱️ 團隊專注計時</div>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-controls">
        <button class="btn-sm" id="timerToggleBtn" onclick="app.toggleTimer()">開始</button>
        <button class="btn-sm" onclick="app.resetTimer()">重設</button>
        <button class="btn-sm" id="pomoBtn" onclick="app.setTimerMode(25)">番茄鐘</button>
        <button class="btn-sm" id="breakBtn" onclick="app.setTimerMode(5)">休息</button>
      </div>
    </div>

    <div class="app-card">
      <div class="section-title">💬 房間即時討論</div>
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="add-box">
          <input type="text" id="chatInput" placeholder="輸入訊息..." onkeydown="if(event.key==='Enter') app.sendChatMessage()" />
          <button onclick="app.sendChatMessage()">傳送</button>
        </div>
      </div>
    </div>

    <button class="btn-secondary" onclick="app.exitRoom()" style="margin-bottom: 40px;">返回大廳選擇房間</button>
  </div>

  <div class="modal-overlay" id="roomInfoModal" onclick="this.classList.remove('visible')">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3>房間名稱：<span id="modalRoomName"></span></h3>
      <p style="color: var(--brown-light); font-size: 13px;">分享此代碼給好友，即可共同編輯！</p>
      <div class="room-code-tag" id="modalRoomCode">------</div>
      <button class="btn-primary" onclick="app.copyRoomCode()" style="padding: 10px; font-size:14px;">📋 複製邀請碼</button>
      <button class="btn-secondary" onclick="document.getElementById('roomInfoModal').classList.remove('visible')" style="padding: 8px; margin-top:10px; font-size:14px;">關閉</button>
    </div>
  </div>

  <script>
    const app = {
      state: {
        userId: '',
        userEmail: '',
        roomId: '',
        roomName: '',
        folders: [],
        tabs: [],
        activeFolderId: 'default',
        activeTabId: '',
        isOnline: true,
        timerInstance: null
      },
      fbListeners: [],

      init() {
        // 每秒檢查一下 Firebase 是否初始化完成
        const checkFB = setInterval(() => {
          if (window.fbDB) {
            clearInterval(checkFB);
            this.bindAuthChanges();
          }
        }, 100);
      },

      /* 🔒 帳號與門戶監聽 (保留 index (2) 功能) */
      bindAuthChanges() {
        // 本地暫代 Auth 機制 (配合 Realtime DB 安全防護與多房間系統)
        const savedUid = localStorage.getItem('planner_uid');
        const savedEmail = localStorage.getItem('planner_email');
        if (savedUid && savedEmail) {
          this.state.userId = savedUid;
          this.state.userEmail = savedEmail;
          this.switchScreen('roomScreen');
          document.getElementById('userGreeting').textContent = `哈囉 (${savedEmail})！請建立一個新房間，或輸入好友的邀請碼加入。`;
        }
      },

      handleAuth(type) {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!email || !password) return alert('請填寫完整帳號與密碼！');
        if (password.length < 6) return alert('為了安全起見，密碼必須至少 6 位數哦！');

        const { ref, set, get } = window.fbRefs;
        const cleanEmailKey = email.replace(/[.#$\[\]]/g, "_");
        const userRef = ref(window.fbDB, `users/${cleanEmailKey}`);

        if (type === 'register') {
          get(userRef).then((snapshot) => {
            if (snapshot.exists()) {
              alert('此帳號已存在，請直接登入！');
            } else {
              const uid = this._genUserId();
              set(userRef, { uid, password, email }).then(() => {
                alert('🎉 註冊成功！已為您自動登入。');
                this._logInSuccess(uid, email);
              });
            }
          });
        } else {
          get(userRef).then((snapshot) => {
            if (snapshot.exists() && snapshot.val().password === password) {
              this._logInSuccess(snapshot.val().uid, email);
            } else {
              alert('帳號密碼錯誤或不存在，請重新確認！');
            }
          });
        }
      },

      _logInSuccess(uid, email) {
        localStorage.setItem('planner_uid', uid);
        localStorage.setItem('planner_email', email);
        this.state.userId = uid;
        this.state.userEmail = email;
        document.getElementById('userGreeting').textContent = `哈囉 (${email})！請建立一個新房間，或輸入好友的邀請碼加入。`;
        this.switchScreen('roomScreen');
      },

      handleLogout() {
        localStorage.clear();
        this.state.userId = '';
        this.state.userEmail = '';
        this.switchScreen('loginScreen');
      },

      /* 🏠 房間與大廳處理 */
      handleCreateRoom() {
        const name = document.getElementById('newRoomName').value.trim();
        if (!name) return alert('請幫你的新房間取個可愛的名字吧！');
        const rId = this._genRoomCode();
        
        const { ref, set } = window.fbRefs;
        const roomRef = ref(window.fbDB, `rooms/${rId}`);
        
        const initialData = {
          info: { id: rId, name: name, createdAt: Date.now() },
          folders: { default: { id: 'default', name: '主要分類', order: 0 } },
          tabs: { default_tab: { id: 'default_tab', folderId: 'default', name: '總覽頁面', order: 0 } }
        };

        set(roomRef, initialData).then(() => {
          this.enterRoom(rId);
        }).catch(err => alert('建立失敗: ' + err));
      },

      handleJoinRoom() {
        const rId = document.getElementById('joinRoomId').value.trim().toUpperCase();
        if (rId.length !== 8) return alert('邀請碼必須是 8 位英文數字哦！');

        const { ref, get } = window.fbRefs;
        get(ref(window.fbDB, `rooms/${rId}/info`)).then((snap) => {
          if (snap.exists()) {
            this.enterRoom(rId);
          } else {
            alert('找不到該房間，請檢查邀請碼是否正確！');
          }
        });
      },

      enterRoom(rId) {
        this.state.roomId = rId;
        this.switchScreen('appScreen');
        this.setupRoomSync();
      },

      exitRoom() {
        this.detachRoomListeners();
        this.state.roomId = '';
        this.switchScreen('roomScreen');
      },

      /* ⚡ 即時雲端數據同步核心 */
      setupRoomSync() {
        const { ref, onValue, set, onDisconnect } = window.fbRefs;
        const rId = this.state.roomId;

        // 1. 監聽房間基本資訊
        const infoRef = ref(window.fbDB, `rooms/${rId}/info`);
        this._addTrackedListener(infoRef, onValue(infoRef, (snap) => {
          if (snap.exists()) {
            this.state.roomName = snap.val().name;
            document.getElementById('roomTitleName').textContent = snap.val().name + ' ▾';
          }
        }));

        // 2. 監聽資料夾結構
        const foldersRef = ref(window.fbDB, `rooms/${rId}/folders`);
        this._addTrackedListener(foldersRef, onValue(foldersRef, (snap) => {
          const list = [];
          snap.forEach((child) => { list.push(child.val()); });
          this.state.folders = list.sort((a,b) => (a.order || 0) - (b.order || 0));
          
          if (!this.state.folders.find(f => f.id === this.state.activeFolderId)) {
            this.state.activeFolderId = this.state.folders[0]?.id || 'default';
          }
          this.render();
        }));

        // 3. 監聽分頁構造
        const tabsRef = ref(window.fbDB, `rooms/${rId}/tabs`);
        this._addTrackedListener(tabsRef, onValue(tabsRef, (snap) => {
          const list = [];
          snap.forEach((child) => { list.push(child.val()); });
          this.state.tabs = list.sort((a,b) => (a.order || 0) - (b.order || 0));
          
          const currentTabs = this.state.tabs.filter(t => t.folderId === this.state.activeFolderId);
          if (currentTabs.length > 0 && !currentTabs.find(t => t.id === this.state.activeTabId)) {
            this.state.activeTabId = currentTabs[0].id;
          }
          this.render();
        }));

        // 4. 當前分頁內容深度同步 (待辦事項、隨手貼、計時器、聊天室)
        this.setupContentSync();

        // 5. 線上狀態同步名冊機制
        const presenceRef = ref(window.fbDB, `rooms/${rId}/presence/${this.state.userId}`);
        set(presenceRef, { email: this.state.userEmail, lastSeen: Date.now() });
        onDisconnect(presenceRef).remove();

        const allPresenceRef = ref(window.fbDB, `rooms/${rId}/presence`);
        this._addTrackedListener(allPresenceRef, onValue(allPresenceRef, (snap) => {
          const usersBar = document.getElementById('usersBar');
          if (usersBar) {
            let html = '';
            snap.forEach((u) => {
              html += `<div class="user-avatar">👤 ${this._escapeHtml(u.val().email.split('@')[0])}</div>`;
            });
            usersBar.innerHTML = html;
          }
        }));
      },

      setupContentSync() {
        const { ref, onValue } = window.fbRefs;
        const rId = this.state.roomId;

        // 清理前一個分頁的單獨監聽器
        if (this.contentListeners) { this.contentListeners.forEach(un => un()); }
        this.contentListeners = [];

        if (!this.state.activeTabId) return;
        const tId = this.state.activeTabId;

        // 監聽待辦事項
        const todosRef = ref(window.fbDB, `rooms/${rId}/data/${tId}/todos`);
        this.contentListeners.push(onValue(todosRef, (snap) => {
          const container = document.getElementById('todoList');
          if (!container) return;
          let html = '';
          snap.forEach((child) => {
            const item = child.val();
            html += `
              <div class="todo-item ${item.done ? 'done' : ''}">
                <div class="todo-checkbox" onclick="app.toggleTodo('${item.id}', ${item.done})">${item.done ? '✓' : ''}</div>
                <div class="todo-text">${this._escapeHtml(item.text)}</div>
                <div class="todo-del" onclick="app.deleteTodo('${item.id}')">✕</div>
              </div>
            `;
          });
          container.innerHTML = html;
        }));

        // 監聽隨手貼靈感
        const notesRef = ref(window.fbDB, `rooms/${rId}/data/${tId}/notes`);
        this.contentListeners.push(onValue(notesRef, (snap) => {
          const container = document.getElementById('notesGrid');
          if (!container) return;
          let html = '';
          snap.forEach((child) => {
            const item = child.val();
            html += `
              <div class="sticky-note">
                <span class="note-del" onclick="app.deleteNote('${item.id}')">✕</span>
                <textarea onchange="app.updateNote('${item.id}', this.value)">${this._escapeHtml(item.content || '')}</textarea>
              </div>
            `;
          });
          container.innerHTML = html;
        }));

        // 監聽即時聊天室 (限定此分頁討論)
        const chatsRef = ref(window.fbDB, `rooms/${rId}/data/${tId}/chats`);
        this.contentListeners.push(onValue(chatsRef, (snap) => {
          const container = document.getElementById('chatMessages');
          if (!container) return;
          let html = '';
          snap.forEach((child) => {
            const msg = child.val();
            const isMe = msg.uid === this.state.userId;
            html += `
              <div class="chat-msg ${isMe ? 'me' : 'other'}">
                <div class="msg-user">${this._escapeHtml(msg.user.split('@')[0])}</div>
                <div>${this._escapeHtml(msg.text)}</div>
              </div>
            `;
          });
          container.innerHTML = html;
          container.scrollTop = container.scrollHeight;
        }));

        // 監聽倒數計時器
        const timerRef = ref(window.fbDB, `rooms/${rId}/data/${tId}/timer`);
        this.contentListeners.push(onValue(timerRef, (snap) => {
          if (!snap.exists()) return;
          const data = snap.val();
          this.syncTimerState(data);
        }));
      },

      _addTrackedListener(refObj, unsubscribeFunc) {
        this.fbListeners.push({ refObj, unsubscribeFunc });
      },
      detachRoomListeners() {
        if (this.fbListeners) { this.fbListeners.forEach(item => item.unsubscribeFunc()); this.fbListeners = []; }
        if (this.contentListeners) { this.contentListeners.forEach(un => un()); this.contentListeners = []; }
        if (this.state.timerInstance) { clearInterval(this.state.timerInstance); this.state.timerInstance = null; }
      },

      /* ══════════════════════════════════════════════
         🎨 資料夾與分頁畫面動態渲染更新 (融合 index.html 外觀樣式)
      ══════════════════════════════════════════════ */
      render() {
        /* 1. 渲染 資料夾 橫列 */
        const foldersStrip = document.getElementById('foldersStrip');
        if (foldersStrip) {
          let html = '';
          this.state.folders.forEach(f => {
            const isActive = f.id === this.state.activeFolderId;
            html += `
              <div class="folder-tab ${isActive ? 'active' : ''}" onclick="app.switchFolder('${f.id}')">
                <span>📁 ${this._escapeHtml(f.name)}</span>
                ${f.id !== 'default' ? `<span class="folder-del-btn" onclick="event.stopPropagation(); app.deleteFolder('${f.id}')">✕</span>` : ''}
              </div>
            `;
          });
          html += `
            <div class="folder-tab-add" onclick="app.promptAddFolder()">
              <span>＋ 新增資料夾</span>
            </div>
          `;
          foldersStrip.innerHTML = html;
        }

        /* 2. 渲染對應資料夾下的 分頁橫列 */
        const tabsStrip = document.getElementById('tabsStrip');
        const tabsSection = document.getElementById('tabsSection');
        if (tabsStrip) {
          const currentTabs = this.state.tabs.filter(t => t.folderId === this.state.activeFolderId);
          if (currentTabs.length === 0) {
            tabsSection.style.display = 'none';
          } else {
            tabsSection.style.display = 'block';
            let html = '';
            currentTabs.forEach(t => {
              const isActive = t.id === this.state.activeTabId;
              html += `
                <div class="tab-item ${isActive ? 'active' : ''}" onclick="app.switchTab('${t.id}')">
                  <span>${this._escapeHtml(t.name)}</span>
                  ${currentTabs.length > 1 ? `<span class="tab-del-btn" onclick="event.stopPropagation(); app.deleteTab('${t.id}')">✕</span>` : ''}
                </div>
              `;
            });
            html += `
              <button class="tab-item-add" onclick="app.promptAddTab()">
                <span>＋ 新增分頁</span>
              </button>
            `;
            tabsStrip.innerHTML = html;
          }
        }
      },

      /* 資料夾與分頁之動態操控 */
      switchFolder(fId) {
        this.state.activeFolderId = fId;
        const currentTabs = this.state.tabs.filter(t => t.folderId === fId);
        this.state.activeTabId = currentTabs[0]?.id || '';
        this.render();
        this.setupRoomSync();
      },
      switchTab(tId) {
        this.state.activeTabId = tId;
        this.render();
        this.setupContentSync();
      },

      promptAddFolder() {
        const name = prompt("請輸入新資料夾名稱：");
        if (!name || !name.trim()) return;
        const { ref, set } = window.fbRefs;
        const id = this.generateId();
        set(ref(window.fbDB, `rooms/${this.state.roomId}/folders/${id}`), {
          id, name: name.trim(), order: this.state.folders.length * 10
        }).then(() => {
          // 自動幫新建的資料夾補上一個預設分頁
          const tabId = this.generateId();
          set(ref(window.fbDB, `rooms/${this.state.roomId}/tabs/${tabId}`), {
            id: tabId, folderId: id, name: '第一頁', order: 0
          });
          this.state.activeFolderId = id;
          this.state.activeTabId = tabId;
        });
      },
      deleteFolder(id) {
        if (!confirm('您確定要刪除整個資料夾與底下的所有分頁內容嗎？')) return;
        const { ref, remove } = window.fbRefs;
        remove(ref(window.fbDB, `rooms/${this.state.roomId}/folders/${id}`));
        // 連帶刪除該資料夾分頁
        this.state.tabs.filter(t => t.folderId === id).forEach(t => {
          remove(ref(window.fbDB, `rooms/${this.state.roomId}/tabs/${t.id}`));
          remove(ref(window.fbDB, `rooms/${this.state.roomId}/data/${t.id}`));
        });
      },

      promptAddTab() {
        const name = prompt("請輸入新分頁標題：");
        if (!name || !name.trim()) return;
        const { ref, set } = window.fbRefs;
        const id = this.generateId();
        set(ref(window.fbDB, `rooms/${this.state.roomId}/tabs/${id}`), {
          id, folderId: this.state.activeFolderId, name: name.trim(), order: this.state.tabs.length * 10
        }).then(() => {
          this.state.activeTabId = id;
        });
      },
      deleteTab(id) {
        if (!confirm('確定刪除該分頁與其所有計畫資料嗎？')) return;
        const { ref, remove } = window.fbRefs;
        remove(ref(window.fbDB, `rooms/${this.state.roomId}/tabs/${id}`));
        remove(ref(window.fbDB, `rooms/${this.state.roomId}/data/${id}`));
      },

      /* 📝 項目操作 (待辦事項) */
      addTodo() {
        const input = document.getElementById('newTodoText');
        const text = input.value.trim();
        if (!text) return;
        const { ref, set } = window.fbRefs;
        const id = this.generateId();
        set(ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/todos/${id}`), { id, text, done: false });
        input.value = '';
      },
      toggleTodo(id, curStatus) {
        const { ref, update } = window.fbRefs;
        update(ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/todos/${id}`), { done: !curStatus });
      },
      deleteTodo(id) {
        const { ref, remove } = window.fbRefs;
        remove(ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/todos/${id}`));
      },

      /* 💡 靈感貼紙控制 */
      addNote() {
        const { ref, set } = window.fbRefs;
        const id = this.generateId();
        set(ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/notes/${id}`), { id, content: '' });
      },
      updateNote(id, val) {
        const { ref, update } = window.fbRefs;
        update(ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/notes/${id}`), { content: val });
      },
      deleteNote(id) {
        const { ref, remove } = window.fbRefs;
        remove(ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/notes/${id}`));
      },

      /* 💬 聊天訊息 */
      sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        const { ref, push } = window.fbRefs;
        push(ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/chats`), {
          uid: this.state.userId, user: this.state.userEmail, text, timestamp: Date.now()
        });
        input.value = '';
      },

      /* ⏱️ 聯合計時器控制邏輯 */
      syncTimerState(data) {
        if (this.state.timerInstance) clearInterval(this.state.timerInstance);
        const display = document.getElementById('timerDisplay');
        const btn = document.getElementById('timerToggleBtn');

        if (data.status === 'running') {
          btn.textContent = '暫停';
          btn.classList.add('active');
          const renderCountdown = () => {
            const elapsed = Math.floor((Date.now() - data.startTime) / 1000);
            const remain = data.duration - elapsed;
            if (remain <= 0) {
              clearInterval(this.state.timerInstance);
              display.textContent = "00:00";
              btn.textContent = "開始";
              btn.classList.remove('active');
            } else {
              display.textContent = this._formatTime(remain);
            }
          };
          renderCountdown();
          this.state.timerInstance = setInterval(renderCountdown, 1000);
        } else {
          btn.textContent = '開始';
          btn.classList.remove('active');
          display.textContent = this._formatTime(data.timeLeft);
        }
      },
      toggleTimer() {
        const { ref, get, set } = window.fbRefs;
        const timerRef = ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/timer`);
        get(timerRef).then(snap => {
          let current = snap.exists() ? snap.val() : { status: 'stopped', duration: 1500, timeLeft: 1500 };
          if (current.status === 'running') {
            const elapsed = Math.floor((Date.now() - current.startTime) / 1000);
            let left = current.duration - elapsed;
            if (left < 0) left = 0;
            set(timerRef, { status: 'paused', duration: current.duration, timeLeft: left });
          } else {
            const d = current.status === 'paused' ? current.timeLeft : current.duration;
            set(timerRef, { status: 'running', duration: d, startTime: Date.now() });
          }
        });
      },
      resetTimer() {
        const { ref, get, set } = window.fbRefs;
        const timerRef = ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/timer`);
        get(timerRef).then(snap => {
          const dur = snap.exists() ? (snap.val().duration || 1500) : 1500;
          set(timerRef, { status: 'stopped', duration: dur, timeLeft: dur });
        });
      },
      setTimerMode(minutes) {
        const { ref, set } = window.fbRefs;
        const dur = minutes * 60;
        set(ref(window.fbDB, `rooms/${this.state.roomId}/data/${this.state.activeTabId}/timer`), {
          status: 'stopped', duration: dur, timeLeft: dur
        });
      },

      /* 🛠️ 共用輔助小工具 */
      switchScreen(sId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible'));
        document.getElementById(sId)?.classList.add('visible');
      },
      _genRoomCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        return Array.from({length: 8}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      },
      _genUserId() { return 'u_' + Math.random().toString(36).substr(2, 9); },
      generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); },
      showRoomInfo() {
        document.getElementById('modalRoomName').textContent = this.state.roomName;
        document.getElementById('modalRoomCode').textContent = this.state.roomId;
        document.getElementById('roomInfoModal').classList.add('visible');
      },
      copyRoomCode() {
        navigator.clipboard.writeText(this.state.roomId).then(() => {
          alert('邀請碼複製成功，快分享給好友加入：' + this.state.roomId);
        });
      },
      _formatTime(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      },
      _escapeHtml(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
    };

    window.onload = () => app.init();
  </script>
</body>
</html>
