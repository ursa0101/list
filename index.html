<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>✨ 我的計劃本（協作版）</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* 使用變數定義所有顏色，方便切換主題 */
    :root {
      --cream: #faf7f2;
      --cream2: #f4efe6;
      --cream3: #ede6d8;
      --brown-light: #c4a882;
      --brown: #9b7b5a;
      --brown-dark: #6b5240;
      --pink: #f2a7b8;
      --pink-light: #fce8ee;
      --green: #7bc8a4;
      --green-light: #e8f7f0;
      --yellow: #f7d98c;
      --yellow-light: #fef8e7;
      --blue: #a7c4e8;
      --blue-light: #eaf2fb;
      --purple: #c4a8e8;
      --purple-light: #f3edfb;
      --text: #5c4a38;
      --text-muted: #9b8878;
      --border: #e2d8cc;
      --shadow: rgba(156, 123, 90, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Nunito", "Zen Maru Gothic", sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ════════════════════════════════════════════════
       登入 / 房間加入介面
    ════════════════════════════════════════════════ */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--cream) 0%, var(--cream2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: var(--radius);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 12px 40px var(--shadow);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .login-card h1 {
      font-size: 28px;
      margin-bottom: 24px;
      color: var(--brown-dark);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-group input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--brown-light);
      background: white;
    }

    .login-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--brown-dark);
      color: white;
    }
    .btn-primary:hover { background: var(--brown); transform: translateY(-1px); }

    .btn-secondary {
      background: var(--cream2);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: var(--cream3); }

    /* 狀態提示 */
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .status-online {
      background: var(--green-light);
      color: var(--green);
    }

    .status-offline {
      background: #ffebee;
      color: #c53030;
    }

    /* 複製房間代碼 */
    .room-code-section {
      background: var(--yellow-light);
      border: 1.5px solid var(--yellow);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin: 20px 0;
      text-align: center;
    }

    .room-code {
      font-size: 24px;
      font-weight: 800;
      color: var(--brown-dark);
      font-family: 'Courier New', monospace;
      letter-spacing: 4px;
      margin: 8px 0;
    }

    .copy-btn {
      background: var(--brown-dark);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: var(--brown); }
    .copy-btn.copied { background: var(--green); }

    /* ════════════════════════════════════════════════
       主應用介面
    ════════════════════════════════════════════════ */
    #appScreen {
      display: none;
    }

    /* 頂部列 */
    .topbar {
      background: var(--cream);
      border-bottom: 1.5px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--brown-dark);
    }

    .online-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    .online-indicator.offline {
      background: #d32f2f;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .topbar-users {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .room-info-btn, .leave-btn {
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .room-info-btn:hover { background: var(--cream2); color: var(--text); }
    .leave-btn:hover { border-color: #d32f2f; color: #d32f2f; }

    /* 主要內容 */
    .main-content {
      padding: 20px 16px 100px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* 分頁列 */
    .tabs-strip {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .tab {
      padding: 8px 14px;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: 1.5px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
      user-select: none;
    }

    .tab:hover { color: var(--text); background: var(--cream2); }

    .tab.active {
      color: var(--brown-dark);
      background: white;
      border-color: var(--border);
      border-bottom-color: white;
    }

    .tab-add {
      padding: 8px 12px;
      color: var(--brown-light);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      font-size: 16px;
    }
    .tab-add:hover { color: var(--brown); background: var(--cream2); }

    /* 清單 */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .todo-item:hover { box-shadow: 0 3px 14px var(--shadow); }

    .todo-item.done {
      opacity: 0.7;
      background: var(--cream2);
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .todo-checkbox {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 14px;
    }

    .todo-checkbox:hover { border-color: var(--brown-light); }

    .todo-checkbox.done {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .todo-delete {
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      color: #d32f2f;
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: all 0.2s;
    }

    .todo-item:hover .todo-delete { opacity: 1; }

    .todo-delete:hover { transform: scale(1.2); }

    /* 新增輸入框 */
    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .add-form input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus { border-color: var(--brown-light); background: white; }

    .add-btn {
      background: var(--pink);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .add-btn:hover { background: #e8919e; }

    /* 空狀態 */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

    /* Modal */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(91, 70, 56, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }

    .modal-bg.visible { display: flex; }

    .modal {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--brown-dark);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .sync-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-muted);
      box-shadow: 0 4px 12px var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    .sync-dot.pending {
      background: var(--yellow);
      animation: pulse 1s ease-in-out infinite;
    }

    @media (max-width: 480px) {
      .main-content { padding: 16px 12px 100px; }
      .topbar { padding: 12px 16px; }
      .topbar-title { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════
     登入畫面（房間加入）
════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <h1>✨ 計劃本協作</h1>

    <div id="statusBadge" class="status-badge status-offline">🔴 離線</div>

    <div class="form-group">
      <label>你的名字</label>
      <input type="text" id="nicknameInput" placeholder="例：小美" maxlength="20" />
    </div>

    <div class="form-group">
      <label>房間代碼（或留空建立新房間）</label>
      <input type="text" id="roomCodeInput" placeholder="例：ABC12345" maxlength="8" />
    </div>

    <div class="login-buttons">
      <button class="btn-primary" onclick="app.createRoom()">建立新房間</button>
      <button class="btn-secondary" onclick="app.joinRoom()">加入房間</button>
    </div>

    <!-- 已加入房間後顯示 -->
    <div id="roomCodeSection" class="room-code-section" style="display: none;">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">📌 房間代碼</div>
      <div class="room-code" id="displayRoomCode"></div>
      <button class="copy-btn" onclick="app.copyRoomCode()">📋 複製代碼</button>
      <div style="font-size: 11px; color: var(--text-muted); margin-top: 10px;">分享給朋友，他們可以用這個代碼加入</div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     主應用（計劃本）
════════════════════════════════════════════ -->
<div id="appScreen">
  <!-- 頂部列 -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="online-indicator" id="onlineIndicator"></div>
      <div class="topbar-title" id="appTitle">我的計劃本</div>
    </div>
    <div class="topbar-users" id="userCount">1 人在線</div>
    <div class="topbar-right">
      <button class="room-info-btn" onclick="app.showRoomInfo()">📍 房間</button>
      <button class="leave-btn" onclick="app.leaveRoom()">🚪 離開</button>
    </div>
  </div>

  <!-- 主要內容 -->
  <div class="main-content">
    <!-- 分頁列 -->
    <div class="tabs-strip" id="tabsStrip">
      <span class="tab-add" onclick="app.addTab()">＋</span>
    </div>

    <!-- 待辦列表 -->
    <div id="tabContent"></div>
  </div>

  <!-- 同步狀態 -->
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">已同步</span>
  </div>
</div>

<!-- 房間資訊 Modal -->
<div id="roomInfoModal" class="modal-bg">
  <div class="modal">
    <h2>📍 房間資訊</h2>
    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">房間代碼</div>
      <div style="font-size: 18px; font-weight: 800; font-family: monospace; letter-spacing: 2px;" id="modalRoomCode"></div>
    </div>
    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">在線人數</div>
      <div style="font-size: 18px; font-weight: 800;" id="modalUserCount"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="document.getElementById('roomInfoModal').classList.remove('visible')">關閉</button>
    </div>
  </div>
</div>

<script>
/**
 * 🎯 多人協作計劃本客戶端
 * ═════════════════════════════════════════
 * 功能：
 *   ✨ WebSocket 即時同步
 *   💾 localStorage 離線支援
 *   👥 多人協作
 *   🔔 即時通知
 * ═════════════════════════════════════════
 */

const app = {
  /* ────────────────────────────────────────
     應用狀態
  ────────────────────────────────────────── */
  state: {
    roomId: null,
    userId: null,
    nickname: null,
    isOnline: false,
    usersCount: 1,
    rooms: new Map(),      /* roomId → room data */
    folders: [],
    tabs: [],
    items: [],
    activeTab: null
  },

  ws: null,              /* WebSocket 連接 */
  serverUrl: null,       /* 伺服器地址（自動檢測） */
  reconnectAttempts: 0,
  maxReconnectAttempts: 10,

  /* ────────────────────────────────────────
     初始化
  ────────────────────────────────────────── */
  init() {
    // 自動檢測伺服器地址
    const protocol = window.location.protocol === 'https:' ? 'https:' : 'http:';
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    this.serverUrl = {
      http: `${protocol}//${window.location.host}`,
      ws: `${wsProtocol}//${window.location.host}`
    };

    // 載入本地儲存的狀態
    const saved = localStorage.getItem('plannerUser');
    if (saved) {
      const user = JSON.parse(saved);
      document.getElementById('nicknameInput').value = user.nickname;
      document.getElementById('roomCodeInput').value = user.lastRoomId || '';
    }

    console.log('✅ 應用初始化完成，伺服器地址:', this.serverUrl.http);
  },

  /* ────────────────────────────────────────
     建立新房間
  ────────────────────────────────────────── */
  async createRoom() {
    const nickname = document.getElementById('nicknameInput').value.trim();
    if (!nickname) {
      alert('請輸入你的名字');
      return;
    }

    try {
      const response = await fetch(`${this.serverUrl.http}/api/rooms`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      });
      const data = await response.json();
      
      this.state.roomId = data.roomId;
      this.state.nickname = nickname;
      this.state.userId = this.generateUserId();
      
      this.saveUserInfo();
      this.showRoomCode();
      this.connect();
    } catch (e) {
      console.error('建立房間失敗:', e);
      alert('無法連接伺服器，請檢查網路');
    }
  },

  /* ────────────────────────────────────────
     加入現有房間
  ────────────────────────────────────────── */
  async joinRoom() {
    const nickname = document.getElementById('nicknameInput').value.trim();
    const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();

    if (!nickname) {
      alert('請輸入你的名字');
      return;
    }

    if (!roomCode) {
      alert('請輸入房間代碼');
      return;
    }

    try {
      /* 驗證房間是否存在 */
      const response = await fetch(
        `${this.serverUrl.http}/api/rooms/${roomCode}`
      );
      if (!response.ok) throw new Error('房間不存在');

      this.state.roomId = roomCode;
      this.state.nickname = nickname;
      this.state.userId = this.generateUserId();

      this.saveUserInfo();
      this.connect();
    } catch (e) {
      console.error('加入房間失敗:', e);
      alert('房間不存在或無法連接');
    }
  },

  /* ────────────────────────────────────────
     連接到伺服器
  ────────────────────────────────────────── */
  connect() {
    if (this.ws) return;

    console.log('🔗 連接到伺服器...');
    this.ws = new WebSocket(this.serverUrl.ws);

    this.ws.onopen = () => {
      console.log('✅ WebSocket 已連接');
      this.reconnectAttempts = 0;
      this.state.isOnline = true;
      this.updateOnlineStatus();

      /* 通知伺服器加入房間 */
      this.send({
        type: 'join',
        roomId: this.state.roomId,
        userId: this.state.userId,
        nickname: this.state.nickname
      });

      /* 要求完整同步 */
      this.send({ type: 'sync' });
    };

    this.ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      this.handleMessage(msg);
    };

    this.ws.onclose = () => {
      console.log('❌ WebSocket 已斷開');
      this.state.isOnline = false;
      this.updateOnlineStatus();
      this.ws = null;

      /* 自動重連 */
      if (this.reconnectAttempts < this.maxReconnectAttempts) {
        this.reconnectAttempts++;
        const delay = Math.min(1000 * Math.pow(2, this.reconnectAttempts), 10000);
        console.log(`⏳ ${(delay / 1000).toFixed(0)} 秒後重連...`);
        setTimeout(() => this.connect(), delay);
      }
    };

    this.ws.onerror = (error) => {
      console.error('WebSocket 錯誤:', error);
    };
  },

  /* ────────────────────────────────────────
     發送訊息到伺服器
  ────────────────────────────────────────── */
  send(msg) {
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify(msg));
      this.showSyncStatus('pending');
    }
  },

  /* ────────────────────────────────────────
     處理來自伺服器的訊息
  ────────────────────────────────────────── */
  handleMessage(msg) {
    console.log('📨 收到訊息:', msg.type);

    switch (msg.type) {
      case 'joined':
        this.showApp();
        break;

      case 'state-sync':
        /* 完整同步：用伺服器資料覆蓋本地 */
        this.state.tabs = msg.tabs || [];
        this.state.folders = msg.folders || [];
        this.state.items = msg.items || [];
        this.state.activeTab = this.state.tabs[0]?.id || null;
        this.render();
        this.showSyncStatus('synced');
        break;

      case 'action':
        /* 其他人的操作 */
        this.applyRemoteAction(msg);
        break;

      case 'user-joined':
        this.state.usersCount = msg.usersCount;
        this.updateUserCount();
        console.log(`👥 ${msg.nickname} 加入房間`);
        break;
    }
  },

  /* ────────────────────────────────────────
     套用遠端操作（其他人的改動）
  ────────────────────────────────────────── */
  applyRemoteAction(msg) {
    const { action, targetType, targetId, data } = msg;

    switch (action) {
      case 'create':
        if (targetType === 'tab') {
          if (!this.state.tabs.find(t => t.id === targetId)) {
            this.state.tabs.push({ id: targetId, ...data });
          }
        } else if (targetType === 'item') {
          if (!this.state.items.find(i => i.id === targetId)) {
            this.state.items.push({ id: targetId, ...data });
          }
        }
        break;

      case 'update':
        if (targetType === 'tab') {
          const tab = this.state.tabs.find(t => t.id === targetId);
          if (tab) Object.assign(tab, data);
        } else if (targetType === 'item') {
          const item = this.state.items.find(i => i.id === targetId);
          if (item) Object.assign(item, data);
        }
        break;

      case 'delete':
        if (targetType === 'tab') {
          this.state.tabs = this.state.tabs.filter(t => t.id !== targetId);
          this.state.items = this.state.items.filter(i => i.tabId !== targetId);
        } else if (targetType === 'item') {
          this.state.items = this.state.items.filter(i => i.id !== targetId);
        }
        break;
    }

    this.render();
  },

  /* ────────────────────────────────────────
     UI 操作
  ────────────────────────────────────────── */
  addTab() {
    const name = prompt('分頁名稱：');
    if (!name) return;

    const tabId = this.generateId();
    this.send({
      type: 'action',
      userId: this.state.userId,
      action: 'create',
      targetType: 'tab',
      targetId: tabId,
      data: { name, color: '#F2A7B8', folderId: null }
    });

    /* 樂觀更新：本地先加，不等伺服器回應 */
    this.state.tabs.push({
      id: tabId,
      name,
      color: '#F2A7B8',
      folderId: null
    });
    this.state.activeTab = tabId;
    this.render();
  },

  addItem(tabId) {
    const text = prompt('待辦內容：');
    if (!text) return;

    const itemId = this.generateId();
    this.send({
      type: 'action',
      userId: this.state.userId,
      action: 'create',
      targetType: 'item',
      targetId: itemId,
      data: { tabId, text, done: 0 }
    });

    this.state.items.push({
      id: itemId,
      tabId,
      text,
      done: 0
    });
    this.render();
  },

  toggleItem(itemId) {
    const item = this.state.items.find(i => i.id === itemId);
    if (!item) return;

    item.done = item.done ? 0 : 1;
    this.send({
      type: 'action',
      userId: this.state.userId,
      action: 'update',
      targetType: 'item',
      targetId: itemId,
      data: { done: item.done }
    });

    this.render();
  },

  deleteItem(itemId) {
    if (!confirm('確定要刪除？')) return;

    this.send({
      type: 'action',
      userId: this.state.userId,
      action: 'delete',
      targetType: 'item',
      targetId: itemId
    });

    this.state.items = this.state.items.filter(i => i.id !== itemId);
    this.render();
  },

  /* ────────────────────────────────────────
     渲染 UI
  ────────────────────────────────────────── */
  render() {
    const tabsStrip = document.getElementById('tabsStrip');
    const tabContent = document.getElementById('tabContent');

    /* 清空舊的分頁按鈕 */
    tabsStrip.innerHTML = '<span class="tab-add" onclick="app.addTab()">＋</span>';

    /* 渲染分頁 */
    this.state.tabs.forEach(tab => {
      const btn = document.createElement('div');
      btn.className = 'tab' + (this.state.activeTab === tab.id ? ' active' : '');
      btn.textContent = tab.name;
      btn.onclick = () => {
        this.state.activeTab = tab.id;
        this.render();
      };
      tabsStrip.appendChild(btn);
    });

    /* 渲染分頁內容 */
    const activeTab = this.state.tabs.find(t => t.id === this.state.activeTab);
    if (!activeTab) {
      tabContent.innerHTML = '<div class="empty-state"><div class="empty-icon">🌸</div><p>建立第一個分頁吧！</p></div>';
      return;
    }

    const tabItems = this.state.items.filter(i => i.tabId === activeTab.id);
    const doneCount = tabItems.filter(i => i.done).length;
    const progress = tabItems.length ? Math.round(doneCount / tabItems.length * 100) : 0;

    let html = `
      <div style="margin-bottom: 16px;">
        <div style="font-size: 22px; font-weight: 800; color: var(--brown-dark); margin-bottom: 4px;">${activeTab.name}</div>
        <div style="font-size: 12px; color: var(--text-muted);">${doneCount}/${tabItems.length} 完成 · ${progress}%</div>
      </div>
    `;

    if (tabItems.length) {
      html += '<div class="todo-list">';
      tabItems.forEach(item => {
        html += `
          <div class="todo-item ${item.done ? 'done' : ''}">
            <div class="todo-checkbox ${item.done ? 'done' : ''}" onclick="app.toggleItem('${item.id}')">
              ${item.done ? '✓' : ''}
            </div>
            <div class="todo-text">${this.escapeHtml(item.text)}</div>
            <button class="todo-delete" onclick="app.deleteItem('${item.id}')">🗑️</button>
          </div>
        `;
      });
      html += '</div>';
    } else {
      html += '<div class="empty-state"><div class="empty-icon">✨</div><p>加入第一個項目吧！</p></div>';
    }

    /* 新增表單 */
    html += `
      <div class="add-form" style="margin-top: 16px;">
        <input type="text" id="newItemInput" placeholder="新增待辦項目..." />
        <button class="add-btn" onclick="app.addItem('${activeTab.id}')">加入</button>
      </div>
    `;

    tabContent.innerHTML = html;

    /* 新增項目 Enter 鍵快速確認 */
    const input = document.getElementById('newItemInput');
    if (input) {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') app.addItem(activeTab.id);
      });
    }
  },

  /* ────────────────────────────────────────
     UI 顯示/隱藏
  ────────────────────────────────────────── */
  showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('appTitle').textContent = `${this.state.nickname} 的計劃本`;
    this.render();
  },

  showRoomCode() {
    const section = document.getElementById('roomCodeSection');
    document.getElementById('displayRoomCode').textContent = this.state.roomId;
    section.style.display = 'block';
  },

  showRoomInfo() {
    document.getElementById('modalRoomCode').textContent = this.state.roomId;
    document.getElementById('modalUserCount').textContent = `${this.state.usersCount} 人在線`;
    document.getElementById('roomInfoModal').classList.add('visible');
  },

  copyRoomCode() {
    navigator.clipboard.writeText(this.state.roomId).then(() => {
      alert('已複製房間代碼：' + this.state.roomId);
    });
  },

  leaveRoom() {
    if (confirm('確定要離開房間？')) {
      this.state.roomId = null;
      localStorage.removeItem('plannerUser');
      location.reload();
    }
  },

  /* ────────────────────────────────────────
     狀態更新
  ────────────────────────────────────────── */
  updateOnlineStatus() {
    const indicator = document.getElementById('onlineIndicator');
    const badge = document.getElementById('statusBadge');
    if (this.state.isOnline) {
      indicator.classList.remove('offline');
      badge.classList.remove('status-offline');
      badge.classList.add('status-online');
      badge.textContent = '🟢 在線';
    } else {
      indicator.classList.add('offline');
      badge.classList.remove('status-online');
      badge.classList.add('status-offline');
      badge.textContent = '🔴 離線';
    }
  },

  updateUserCount() {
    document.getElementById('userCount').textContent = `${this.state.usersCount} 人在線`;
  },

  showSyncStatus(status) {
    const syncDot = document.getElementById('syncDot');
    const syncText = document.getElementById('syncText');
    if (status === 'pending') {
      syncDot.classList.add('pending');
      syncText.textContent = '同步中...';
    } else {
      syncDot.classList.remove('pending');
      syncText.textContent = '已同步';
    }
  },

  /* ────────────────────────────────────────
     工具函式
  ────────────────────────────────────────── */
  generateId() {
    return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  },

  generateUserId() {
    let userId = localStorage.getItem('userId');
    if (!userId) {
      userId = 'user_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('userId', userId);
    }
    return userId;
  },

  saveUserInfo() {
    localStorage.setItem('plannerUser', JSON.stringify({
      userId: this.state.userId,
      nickname: this.state.nickname,
      lastRoomId: this.state.roomId
    }));
  },

  escapeHtml(text) {
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
  }
};

/* 初始化應用 */
document.addEventListener('DOMContentLoaded', () => {
  app.init();
});
</script>
</body>
</html>
