<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>✨ 我的計劃本（協作版）</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --cream: #faf7f2;
      --cream2: #f4efe6;
      --cream3: #ede6d8;
      --brown-light: #c4a882;
      --brown: #9b7b5a;
      --brown-dark: #6b5240;
      --pink: #f2a7b8;
      --pink-light: #fce8ee;
      --green: #7bc8a4;
      --green-light: #e8f7f0;
      --yellow: #f7d98c;
      --yellow-light: #fef8e7;
      --blue: #a7c4e8;
      --blue-light: #eaf2fb;
      --purple: #c4a8e8;
      --purple-light: #f3edfb;
      --text: #5c4a38;
      --text-muted: #9b8878;
      --border: #e2d8cc;
      --shadow: rgba(156, 123, 90, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Nunito", "Zen Maru Gothic", sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* 登入介面 */
    #loginScreen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--cream) 0%, var(--cream2) 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
    .login-card { background: white; border-radius: var(--radius); padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 12px 40px var(--shadow); }
    .login-card h1 { font-size: 28px; margin-bottom: 24px; color: var(--brown-dark); text-align: center; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px; background: var(--cream); outline: none; }
    .form-group input:focus { border-color: var(--brown-light); background: white; }
    .login-buttons { display: flex; gap: 10px; }
    .btn-primary, .btn-secondary { flex: 1; padding: 12px 20px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--brown-dark); color: white; }
    .btn-primary:hover { background: var(--brown); }
    .btn-secondary { background: var(--cream2); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--cream3); }

    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 20px; text-align: center; }
    .status-online { background: var(--green-light); color: var(--green); }
    .status-offline { background: #ffebee; color: #c53030; }

    .room-code-section { background: var(--yellow-light); border: 1.5px solid var(--yellow); border-radius: var(--radius-sm); padding: 14px; margin: 20px 0; text-align: center; }
    .room-code { font-size: 24px; font-weight: 800; color: var(--brown-dark); letter-spacing: 4px; margin: 8px 0; }
    .copy-btn { background: var(--brown-dark); color: white; border: none; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }

    /* 主應用介面 */
    #appScreen { display: none; }
    .topbar { background: var(--cream); border-bottom: 1.5px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title { font-size: 20px; font-weight: 800; color: var(--brown-dark); outline: none; }
    .online-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .online-indicator.offline { background: #d32f2f; }
    .topbar-users { font-size: 12px; color: var(--text-muted); font-weight: 600; }
    .topbar-right { display: flex; gap: 10px; }
    .room-info-btn, .leave-btn { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: transparent; font-size: 12px; font-weight: 700; cursor: pointer; }
    .room-info-btn:hover { background: var(--cream2); }
    .leave-btn:hover { border-color: #d32f2f; color: #d32f2f; }

    .main-content { padding: 20px 16px 100px; max-width: 680px; margin: 0 auto; }
    .tabs-strip { display: flex; gap: 4px; margin-bottom: 20px; overflow-x: auto; align-items: center; }
    .tab { padding: 8px 14px; border-radius: 10px 10px 0 0; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); border: 1.5px solid transparent; white-space: nowrap; }
    .tab.active { color: var(--brown-dark); background: white; border-color: var(--border); border-bottom-color: white; }
    .tab-add { padding: 8px 12px; color: var(--brown-light); cursor: pointer; font-size: 16px; }

    /* 待辦項目清單 */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }
    .todo-item { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .todo-item.done { opacity: 0.6; background: var(--cream2); }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-muted); }
    .todo-left { display: flex; align-items: center; gap: 12px; flex: 1; }
    .todo-checkbox { width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
    .todo-checkbox.done { border-color: var(--green); background: var(--green-light); color: var(--green); }
    .todo-text { font-size: 14px; font-weight: 600; }
    .todo-delete { background: none; border: none; color: #d32f2f; cursor: pointer; font-size: 14px; font-weight: bold; padding: 4px; }

    .add-form { display: flex; gap: 10px; margin-bottom: 16px; }
    .add-form input { flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 13px; font-size: 14px; background: var(--cream); outline: none; }
    .add-form input:focus { background: white; border-color: var(--brown-light); }
    .add-btn { background: var(--pink); color: white; border: none; border-radius: var(--radius-sm); padding: 9px 16px; font-weight: 700; cursor: pointer; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .sync-status { position: fixed; bottom: 20px; right: 20px; background: white; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 12px var(--shadow); }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(91, 70, 56, 0.35); display: none; align-items: center; justify-content: center; z-index: 500; }
    .modal-bg.visible { display: flex; }
    .modal { background: white; border-radius: var(--radius); padding: 24px; max-width: 360px; width: 100%; }
    .modal h2 { font-size: 18px; margin-bottom: 16px; color: var(--brown-dark); }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>✨ 計劃本協作</h1>
    <center><div id="statusBadge" class="status-badge status-offline">🔴 雲端載入中...</div></center>

    <div class="form-group">
      <label>你的名字</label>
      <input type="text" id="nicknameInput" placeholder="例：小美" maxlength="20" />
    </div>

    <div class="form-group">
      <label>房間代碼（留空建立新房間）</label>
      <input type="text" id="roomCodeInput" placeholder="例：ABC12345" maxlength="8" />
    </div>

    <div class="login-buttons">
      <button class="btn-primary" onclick="app.createRoom()">建立新房間</button>
      <button class="btn-secondary" onclick="app.joinRoom()">加入房間</button>
    </div>

    <div id="roomCodeSection" class="room-code-section" style="display: none;">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">📌 新房間建立成功！代碼為：</div>
      <div class="room-code" id="displayRoomCode"></div>
      <button class="copy-btn" onclick="app.copyRoomCode()">📋 複製代碼並進入</button>
    </div>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="online-indicator" id="onlineIndicator"></div>
      <div class="topbar-title" id="appTitle" contenteditable="true">我的計劃本</div>
    </div>
    <div class="topbar-users" id="userCount">1 人在線</div>
    <div class="topbar-right">
      <button class="room-info-btn" onclick="app.showRoomInfo()">📍 房間</button>
      <button class="leave-btn" onclick="app.leaveRoom()">🚪 離開</button>
    </div>
  </div>

  <div class="main-content">
    <div class="add-form">
      <input type="text" placeholder="新增待辦事項..." id="todoInput" maxlength="60" />
      <button class="add-btn" onclick="app.addTodo()">加入</button>
    </div>
    
    <div class="tabs-strip" id="tabsStrip">
      </div>

    <div class="todo-list" id="tabContent">
      </div>
  </div>

  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">已同步</span>
  </div>
</div>

<div id="roomInfoModal" class="modal-bg">
  <div class="modal">
    <h2>📍 房間資訊</h2>
    <div style="margin-bottom: 16px; margin-top:12px;">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">房間代碼</div>
      <div style="font-size: 18px; font-weight: 800; font-family: monospace; letter-spacing: 2px;" id="modalRoomCode"></div>
    </div>
    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">目前在線</div>
      <div style="font-size: 16px; font-weight: 600;" id="modalUserCount"></div>
    </div>
    <button class="btn-primary" style="width:100%" onclick="document.getElementById('roomInfoModal').classList.remove('visible')">關閉</button>
  </div>
</div>

<script>
  // Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyBO3BaSLWDB1DA6znk6kdo7MTN5kW56AWQ",
    authDomain: "my-travel-planner-3c04a.firebaseapp.com",
    databaseURL: "https://my-travel-planner-3c04a-default-rtdb.firebaseio.com",
    projectId: "my-travel-planner-3c04a",
    storageBucket: "my-travel-planner-3c04a.firebasestorage.app",
    messagingSenderId: "1061443894751",
    appId: "1:1061443894751:web:9117b1071228fffe05186a",
    measurementId: "G-8DWEG0DFPZ"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let roomId = "";
  let nickname = "";
  let roomRef = null;
  let isRemoteUpdate = false;

  // 預設核心資料結構
  let state = {
    title: "我的計劃本",
    tabs: [
      { id: "t1", name: "今日任務" },
      { id: "t2", name: "購物清單" }
    ],
    activeTab: "t1",
    todos: [
      { id: "i1", tabId: "t1", text: "喝 8 杯水 💧", done: false },
      { id: "i2", tabId: "t1", text: "好好放鬆 🥐", done: true },
      { id: "i3", tabId: "t2", text: "買鮮奶 🥛", done: false }
    ]
  };

  // 檢測 Firebase 是否連線成功
  db.ref(".info/connected").on("value", (snap) => {
    const badge = document.getElementById("statusBadge");
    if (snap.val() === true) {
      badge.textContent = "🟢 雲端已連線";
      badge.className = "status-badge status-online";
    } else {
      badge.textContent = "🔴 離線";
      badge.className = "status-badge status-offline";
    }
  });

  // 封裝成 app 供 HTML 按鈕點擊
  const app = {
    generateRoomCode() {
      return Math.random().toString(36).substring(2, 10).toUpperCase();
    },

    createRoom() {
      nickname = document.getElementById("nicknameInput").value.trim() || "匿名使用者";
      const code = this.generateRoomCode();
      document.getElementById("displayRoomCode").textContent = code;
      document.getElementById("roomCodeSection").style.display = "block";
      document.getElementById("roomCodeInput").value = code;
    },

    joinRoom() {
      nickname = document.getElementById("nicknameInput").value.trim() || "匿名使用者";
      roomId = document.getElementById("roomCodeInput").value.trim().toUpperCase();

      if (!roomId) {
        alert("請輸入房間代碼，或是點擊「建立新房間」！");
        return;
      }

      roomRef = db.ref("rooms/" + roomId);
      this.initSync();
    },

    copyRoomCode() {
      const code = document.getElementById("displayRoomCode").textContent;
      navigator.clipboard.writeText(code).then(() => {
        alert("代碼已複製到剪貼簿！正在進入房間...");
        this.joinRoom();
      });
    },

    initSync() {
      // 監聽 Firebase 雲端資料變動
      roomRef.on("value", (snapshot) => {
        const data = snapshot.val();
        isRemoteUpdate = true;
        if (data && data.tabs) {
          state = data;
        } else {
          // 乾淨的全新房間，推入預設結構
          roomRef.set(state);
        }
        this.render();
        isRemoteUpdate = false;

        // 切換畫面
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("appScreen").style.display = "block";
      });

      // 追蹤在線人數
      const presenceRef = db.ref(`rooms/${roomId}/users/${nickname}`);
      presenceRef.set(true);
      presenceRef.onDisconnect().remove();

      db.ref(`rooms/${roomId}/users`).on("value", (snap) => {
        const count = snap.numChildren() || 1;
        document.getElementById("userCount").textContent = `${count} 人在線`;
      });
    },

    save() {
      if (!isRemoteUpdate && roomRef) {
        document.getElementById("syncDot").style.background = "var(--yellow)";
        document.getElementById("syncText").textContent = "同步中...";
        roomRef.set(state).then(() => {
          document.getElementById("syncDot").style.background = "var(--green)";
          document.getElementById("syncText").textContent = "已同步";
        });
      }
    },

    render() {
      document.getElementById("appTitle").textContent = state.title || "我的計劃本";
      
      // 1. 渲染頁籤
      const tabsStrip = document.getElementById("tabsStrip");
      tabsStrip.innerHTML = "";
      state.tabs.forEach(tab => {
        const span = document.createElement("span");
        span.className = `tab ${state.activeTab === tab.id ? 'active' : ''}`;
        span.textContent = tab.name;
        span.onclick = () => {
          state.activeTab = tab.id;
          app.render();
        };
        tabsStrip.appendChild(span);
      });
      
      const addBtn = document.createElement("span");
      addBtn.className = "tab-add";
      addBtn.textContent = "＋";
      addBtn.onclick = () => {
        const name = prompt("請輸入新分頁名稱：");
        if (name) {
          const newId = "t_" + Date.now();
          state.tabs.push({ id: newId, name: name });
          state.activeTab = newId;
          app.render();
          app.save();
        }
      };
      tabsStrip.appendChild(addBtn);

      // 2. 渲染待辦事項
      const tabContent = document.getElementById("tabContent");
      tabContent.innerHTML = "";
      
      const currentTodos = state.todos.filter(t => t.tabId === state.activeTab);
      
      if (currentTodos.length === 0) {
        tabContent.innerHTML = `<div class="empty-state">🌸 還沒有任何項目，快去新增吧！</div>`;
        return;
      }

      currentTodos.forEach(item => {
        const div = document.createElement("div");
        div.className = `todo-item ${item.done ? 'done' : ''}`;
        div.innerHTML = `
          <div class="todo-left">
            <div class="todo-checkbox ${item.done ? 'done' : ''}" onclick="app.toggleTodo('${item.id}')">
              ${item.done ? '✓' : ''}
            </div>
            <div class="todo-text">${item.text}</div>
          </div>
          <button class="todo-delete" onclick="app.deleteTodo('${item.id}')">🗑️</button>
        `;
        tabContent.appendChild(div);
      });
    },

    addTodo() {
      const input = document.getElementById("todoInput");
      const text = input.value.trim();
      if (!text) return;

      state.todos.push({
        id: "i_" + Date.now(),
        tabId: state.activeTab,
        text: text,
        done: false
      });
      input.value = "";
      this.render();
      this.save();
    },

    toggleTodo(id) {
      const item = state.todos.find(t => t.id === id);
      if (item) {
        item.done = !item.done;
        this.render();
        this.save();
      }
    },

    deleteTodo(id) {
      state.todos = state.todos.filter(t => t.id !== id);
      this.render();
      this.save();
    },

    showRoomInfo() {
      document.getElementById("modalRoomCode").textContent = roomId;
      db.ref(`rooms/${roomId}/users`).once("value", (snap) => {
        const users = Object.keys(snap.val() || {}).join(", ") || nickname;
        document.getElementById("modalUserCount").textContent = users;
        document.getElementById("roomInfoModal").classList.add("visible");
      });
    },

    leaveRoom() {
      if (confirm("確定要離開房間嗎？")) {
        window.location.reload();
      }
    }
  };

  // 監聽標題修改
  document.getElementById("appTitle").addEventListener("blur", () => {
    state.title = document.getElementById("appTitle").textContent.trim() || "我的計劃本";
    app.save();
  });
</script>

</body>
</html>
