<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>✨ 我的計劃本（協作帳號版）</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase, ref, set, get, update, remove,
      onValue, onChildAdded, onChildChanged, onChildRemoved,
      push, serverTimestamp, onDisconnect
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    /* ══════════════════════════════════════════════
       🔥 請在此填入你的 Firebase 設定（請確保與你的資料庫一致）
    ══════════════════════════════════════════════ */
    const firebaseConfig = {
      apiKey:            "YOUR_API_KEY",
      authDomain:        "YOUR_PROJECT.firebaseapp.com",
      databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId:         "YOUR_PROJECT",
      storageBucket:     "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId:             "YOUR_APP_ID"
    };

    try {
      const firebaseApp = initializeApp(firebaseConfig);
      const db = getDatabase(firebaseApp);

      window._fb = {
        db, ref, set, get, update, remove,
        onValue, onChildAdded, onChildChanged, onChildRemoved,
        push, serverTimestamp, onDisconnect
      };
    } catch(e) {
      console.error("Firebase 初始化失敗，請檢查設定金鑰:", e);
    }

    /* Firebase 載入後才初始化 app */
    document.addEventListener('DOMContentLoaded', () => {
      app.init();
    });
  </script>

  <style>
    :root {
      --cream: #faf7f2;
      --cream2: #f4efe6;
      --cream3: #ede6d8;
      --brown-light: #c4a882;
      --brown: #9b7b5a;
      --brown-dark: #6b5240;
      --pink: #f2a7b8;
      --pink-light: #fce8ee;
      --green: #7bc8a4;
      --green-light: #e8f7f0;
      --yellow: #f7d98c;
      --yellow-light: #fef8e7;
      --blue: #a7c4e8;
      --blue-light: #eaf2fb;
      --purple: #c4a8e8;
      --purple-light: #f3edfb;
      --text: #5c4a38;
      --text-muted: #9b8878;
      --border: #e2d8cc;
      --shadow: rgba(156, 123, 90, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Nunito", "Zen Maru Gothic", sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 登入 / 註冊大畫面容器 ── */
    #authScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--cream) 0%, var(--cream2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      overflow-y: auto;
    }

    /* 獨立卡片樣式 */
    .auth-card {
      background: white;
      border-radius: var(--radius);
      padding: 35px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 12px 40px var(--shadow);
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .auth-card h1 { font-size: 26px; margin-bottom: 20px; color: var(--brown-dark); text-align: center; font-weight: 800; }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .form-group input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--brown-light); background: white; }

    .auth-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }

    .btn-primary, .btn-secondary {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-primary { background: var(--brown-dark); color: white; }
    .btn-primary:hover { background: var(--brown); }
    .btn-secondary { background: var(--cream2); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--cream3); }

    /* 跳頁按鈕字體增加點擊提示與觸控範圍 */
    .auth-toggle-link {
      font-size: 14px;
      text-align: center;
      color: var(--brown);
      cursor: pointer;
      margin-top: 16px;
      padding: 8px;
      text-decoration: underline;
      font-weight: 700;
      display: block;
      user-select: none;
    }
    .auth-toggle-link:hover { color: var(--brown-dark); }

    .status-badge {
      display: block;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }
    .status-online  { background: var(--green-light); color: var(--green); }
    .status-offline { background: #ffebee; color: #c53030; }

    .room-code-section {
      background: var(--yellow-light);
      border: 1.5px solid var(--yellow);
      border-radius: var(--radius-sm);
      padding: 14px;
      text-align: center;
    }
    .room-code {
      font-size: 24px;
      font-weight: 800;
      color: var(--brown-dark);
      font-family: 'Courier New', monospace;
      letter-spacing: 4px;
      margin: 8px 0;
    }
    .copy-btn {
      background: var(--brown-dark);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: var(--brown); }

    /* ── 主應用 ── */
    #appScreen { display: none; }

    .topbar {
      background: var(--cream);
      border-bottom: 1.5px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; flex: 1; }
    .topbar-title { font-size: 20px; font-weight: 800; color: var(--brown-dark); }

    .online-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .topbar-users { font-size: 12px; color: var(--text-muted); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .room-info-btn, .leave-btn {
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .room-info-btn:hover { background: var(--cream2); color: var(--text); }
    .leave-btn:hover     { border-color: #d32f2f; color: #d32f2f; }

    .main-content {
      padding: 20px 16px 100px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── 分頁 ── */
    .tabs-strip { display: flex; gap: 4px; margin-bottom: 20px; overflow-x: auto; }
    .tab {
      padding: 8px 14px;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: 1.5px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab.active {
      color: var(--brown-dark);
      background: white;
      border-color: var(--border);
      border-bottom-color: white;
    }
    .tab-add {
      padding: 8px 12px;
      color: var(--brown-light);
      cursor: pointer;
      font-size: 16px;
    }

    /* ── 待辦清單 ── */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }
    .todo-item {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .todo-item.done { opacity: 0.7; background: var(--cream2); }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-muted); }

    .todo-who {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--cream2);
      border-radius: 20px;
      padding: 2px 7px;
    }

    .todo-checkbox {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      font-size: 14px;
    }
    .todo-checkbox.done { border-color: var(--green); background: var(--green-light); color: var(--green); }

    .todo-text { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }

    .todo-delete {
      width: 28px; height: 28px;
      border: none;
      background: none;
      color: #d32f2f;
      cursor: pointer;
      font-size: 14px;
    }

    .add-form { display: flex; gap: 10px; margin-bottom: 16px; }
    .add-form input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: 14px;
      background: var(--cream);
      outline: none;
    }
    .add-form input:focus { border-color: var(--brown-light); background: white; }

    .add-btn {
      background: var(--pink);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-icon  { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

    .members-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
      padding: 10px 14px; background: var(--cream2); border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    }
    .member-chip {
      display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700;
      color: var(--text); background: white; border-radius: 20px; padding: 4px 10px; border: 1.5px solid var(--border);
    }
    .member-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

    .modal-bg {
      position: fixed; inset: 0; background: rgba(91, 70, 56, 0.35);
      display: none; align-items: center; justify-content: center; z-index: 500;
    }
    .modal-bg.visible { display: flex; }
    .modal { background: white; border-radius: var(--radius); padding: 24px; max-width: 360px; width: 100%; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

    .sync-status {
      position: fixed; bottom: 20px; right: 20px; background: white;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;
    }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .sync-dot.pending { background: var(--yellow); }
  </style>
</head>
<body>

<div id="authScreen">

  <div class="auth-card" id="cardLogin">
    <h1>🔐 計劃本登入</h1>
    <div id="statusBadge" class="status-badge status-offline">🔴 連線中...</div>

    <div class="form-group">
      <label>帳號 (Username)</label>
      <input type="text" id="loginUsername" placeholder="請輸入英文或數字帳號" />
    </div>
    
    <div class="form-group">
      <label>密碼 (Password)</label>
      <input type="password" id="loginPassword" placeholder="請輸入密碼" />
    </div>

    <div class="form-group">
      <label>房間代碼（留空則自動建立新房間）</label>
      <input type="text" id="roomCodeInput" placeholder="例：ABC12345" maxlength="8" style="text-transform:uppercase;" />
    </div>

    <div class="auth-buttons">
      <button class="btn-primary" onclick="app.handleLoginSubmit()">登入系統並進入房間</button>
      <span class="auth-toggle-link" onclick="app.navigateToPage('register')">沒有帳號？前往「註冊新帳號」</span>
    </div>
  </div>

  <div class="auth-card" id="cardRegister" style="display: none;">
    <h1>📝 註冊新帳號</h1>
    <div class="status-badge status-online">✨ 建立你的雲端專屬憑證</div>

    <div class="form-group">
      <label>設定全新帳號</label>
      <input type="text" id="regUsername" placeholder="請輸入欲註冊的英文或數字帳號" />
    </div>
    
    <div class="form-group">
      <label>設定密碼</label>
      <input type="password" id="regPassword" placeholder="請輸入密碼" />
    </div>

    <div class="form-group">
      <label>你的名字 / 顯示暱稱</label>
      <input type="text" id="regNickname" placeholder="例：小美" maxlength="20" />
    </div>

    <div class="auth-buttons">
      <button class="btn-primary" onclick="app.handleRegisterSubmit()">確定註冊帳號</button>
      <button class="btn-secondary" onclick="app.navigateToPage('login')">⬅️ 返回上一頁去登入</button>
    </div>
  </div>

  <div class="auth-card" id="cardRoomCreated" style="display: none;">
    <h1>🏠 新房間建立成功！</h1>
    <div class="room-code-section">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">📌 你的專屬房間代碼</div>
      <div class="room-code" id="displayRoomCode"></div>
      <button class="copy-btn" id="copyRoomBtn" onclick="app.copyRoomCode()">📋 複製代碼</button>
      <div style="font-size:11px;color:var(--text-muted);margin-top:12px;">
        您可以將此代碼分享給協作者，他們登入時輸入即可看見相同計畫！
      </div>
    </div>
    <button class="btn-primary" style="margin-top:20px;" onclick="app.enterApp()">
      進入計劃本空間 →
    </button>
  </div>

</div>

<div id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="online-indicator" id="onlineIndicator"></div>
      <div class="topbar-title" id="appTitle">我的計劃本</div>
    </div>
    <div class="topbar-users" id="userCount">1 人在線</div>
    <div class="topbar-right">
      <button class="room-info-btn" onclick="app.showRoomInfo()">📍 房間</button>
      <button class="leave-btn"     onclick="app.leaveRoom()">🚪 離開</button>
    </div>
  </div>

  <div class="main-content">
    <div class="members-bar" id="membersBar"></div>
    <div class="tabs-strip" id="tabsStrip">
      <span class="tab-add" onclick="app.addTab()">＋</span>
    </div>
    <div id="tabContent"></div>
  </div>

  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">已同步</span>
  </div>
</div>

<div id="roomInfoModal" class="modal-bg">
  <div class="modal">
    <h2>📍 房間資訊</h2>
    <div style="margin-bottom:16px;">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">房間代碼</div>
      <div style="font-size:18px;font-weight:800;font-family:monospace;letter-spacing:2px;" id="modalRoomCode"></div>
    </div>
    <div style="margin-bottom:16px;">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">在線人數</div>
      <div style="font-size:18px;font-weight:800;" id="modalUserCount"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="document.getElementById('roomInfoModal').classList.remove('visible')">關閉</button>
    </div>
  </div>
</div>

<script>
const app = {
  state: {
    roomId:     null,
    userId:     null,
    nickname:   null,
    isOnline:   false,
    tabs:       {},   
    items:      {},   
    members:    {},   
    activeTab:  null
  },
  _unsubs: [],

  init() {
    const wait = setInterval(() => {
      if (window._fb) {
        clearInterval(wait);
        this._onFirebaseReady();
      }
    }, 50);
  },

  _onFirebaseReady() {
    const saved = localStorage.getItem('plannerUser');
    if (saved) {
      try {
        const u = JSON.parse(saved);
        if(u.username) document.getElementById('loginUsername').value = u.username;
        document.getElementById('roomCodeInput').value  = u.lastRoomId || '';
      } catch(_) {}
    }
    const badge = document.getElementById('statusBadge');
    if (badge) {
      badge.className = 'status-badge status-online';
      badge.textContent = '🟢 雲端資料庫已連線';
    }
  },

  /* ── 核心：獨立卡片跳頁機制 ── */
  navigateToPage(targetPage) {
    // 先把所有卡片隱藏
    document.getElementById('cardLogin').style.display = 'none';
    document.getElementById('cardRegister').style.display = 'none';
    document.getElementById('cardRoomCreated').style.display = 'none';

    // 依據目標跳至指定頁面
    if (targetPage === 'login') {
      document.getElementById('cardLogin').style.display = 'block';
    } else if (targetPage === 'register') {
      document.getElementById('cardRegister').style.display = 'block';
    } else if (targetPage === 'roomCreated') {
      document.getElementById('cardRoomCreated').style.display = 'block';
    }
  },

  /* ── 註冊送出邏輯 ── */
  async handleRegisterSubmit() {
    if (!window._fb) return alert("系統連線中，請稍後再試！");
    
    const user = document.getElementById('regUsername').value.trim().toLowerCase();
    const pass = document.getElementById('regPassword').value.trim();
    const nick = document.getElementById('regNickname').value.trim();

    if (!user || !pass || !nick) return alert("請填寫完整帳號、密碼與名字！");

    const { db, ref, get, set } = window._fb;
    
    try {
      const snap = await get(ref(db, `users/${user}`));
      if (snap.exists()) return alert("此帳號已被註冊，請換一個帳號名稱！");

      await set(ref(db, `users/${user}`), {
        username: user,
        password: pass,
        nickname: nick,
        createdAt: Date.now()
      });

      alert("🎉 帳號註冊成功！自動幫您代入登入資訊。");
      
      // 自動填入剛才註冊的帳號，方便使用者直接登入
      document.getElementById('loginUsername').value = user;
      
      // 清空註冊表單
      document.getElementById('regUsername').value = '';
      document.getElementById('regPassword').value = '';
      document.getElementById('regNickname').value = '';

      // 跳回上一頁登入卡片
      this.navigateToPage('login');
    } catch(e) {
      alert("註冊失敗，請確認 Firebase 權限：" + e.message);
    }
  },

  /* ── 登入送出邏輯 ── */
  async handleLoginSubmit() {
    if (!window._fb) return alert("系統連線中，請稍後再試！");

    const user = document.getElementById('loginUsername').value.trim().toLowerCase();
    const pass = document.getElementById('loginPassword').value.trim();
    const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();

    if (!user || !pass) return alert("請輸入帳號與密碼！");

    const { db, ref, get, set } = window._fb;

    try {
      const snap = await get(ref(db, `users/${user}`));
      if (!snap.exists() || snap.val().password !== pass) {
        return alert("帳號或密碼輸入錯誤！");
      }

      const verifiedNickname = snap.val().nickname || user;
      this.state.nickname = verifiedNickname;
      this.state.userId   = this._genUserId();

      // 新建房間流程
      if (!roomCode) {
        const newRoomId = this._genRoomId();
        this.state.roomId = newRoomId;

        await set(ref(db, `rooms/${newRoomId}/meta`), {
          createdAt: Date.now(),
          createdBy: verifiedNickname
        });
        
        this._saveUser(user);
        
        // 顯示 8 碼新代碼卡片頁面
        document.getElementById('displayRoomCode').textContent = newRoomId;
        this.navigateToPage('roomCreated');
      } else {
        // 加入已有房間流程
        const roomSnap = await get(ref(db, `rooms/${roomCode}/meta`));
        if (!roomSnap.exists()) return alert("找不到此房間，請重新確認 8 碼代碼！");

        this.state.roomId = roomCode;
        this._saveUser(user);
        this.enterApp();
      }
    } catch(e) {
      alert("登入錯誤：" + e.message);
    }
  },

  _genRoomId() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length: 8}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  },

  _genUserId() {
    let id = localStorage.getItem('userId');
    if (!id) {
      id = 'u_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('userId', id);
    }
    return id;
  },

  generateId() {
    return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  },

  enterApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display  = 'block';
    document.getElementById('appTitle').textContent = `${this.state.nickname} 的計劃本`;

    this.state.isOnline = true;
    this._setupPresence();
    this._listenTabs();
    this._listenItems();
    this._listenMembers();
  },

  _setupPresence() {
    const { db, ref, set, onDisconnect } = window._fb;
    const presRef = ref(db, `rooms/${this.state.roomId}/presence/${this.state.userId}`);
    set(presRef, { nickname: this.state.nickname, online: true, joinedAt: Date.now() });
    onDisconnect(presRef).remove();   
  },

  _listenMembers() {
    const { db, ref, onValue } = window._fb;
    const unsub = onValue(ref(db, `rooms/${this.state.roomId}/presence`), snap => {
      this.state.members = snap.val() || {};
      const count = Object.keys(this.state.members).length;
      document.getElementById('userCount').textContent = `${count} 人在線`;
      this._renderMembers();
    });
    this._unsubs.push(unsub);
  },

  _renderMembers() {
    const bar = document.getElementById('membersBar');
    bar.innerHTML = Object.entries(this.state.members).map(([uid, m]) => `
      <div class="member-chip"><div class="member-dot"></div>${this.escapeHtml(m.nickname)}${uid === this.state.userId ? ' (你)' : ''}</div>
    `).join('');
  },

  _listenTabs() {
    const { db, ref, onValue } = window._fb;
    const unsub = onValue(ref(db, `rooms/${this.state.roomId}/tabs`), snap => {
      this.state.tabs = snap.val() || {};
      if (!this.state.activeTab || !this.state.tabs[this.state.activeTab]) {
        const ids = Object.keys(this.state.tabs);
        this.state.activeTab = ids.length ? ids[0] : null;
      }
      this.render();
      this.showSyncStatus('synced');
    });
    this._unsubs.push(unsub);
  },

  _listenItems() {
    const { db, ref, onValue } = window._fb;
    const unsub = onValue(ref(db, `rooms/${this.state.roomId}/items`), snap => {
      this.state.items = snap.val() || {};
      this.render();
    });
    this._unsubs.push(unsub);
  },

  addTab() {
    const name = prompt('分頁名稱：');
    if (!name) return;
    const { db, ref, set } = window._fb;
    const tabId = this.generateId();
    this.showSyncStatus('pending');
    set(ref(db, `rooms/${this.state.roomId}/tabs/${tabId}`), { name, order: Date.now() })
      .then(() => { this.state.activeTab = tabId; });
  },

  deleteTab(tabId) {
    if (!confirm(`確定刪除分頁「${this.state.tabs[tabId]?.name}」？`)) return;
    const { db, ref, remove } = window._fb;
    this.showSyncStatus('pending');
    Object.entries(this.state.items).forEach(([iid, item]) => {
      if (item.tabId === tabId) remove(ref(db, `rooms/${this.state.roomId}/items/${iid}`));
    });
    remove(ref(db, `rooms/${this.state.roomId}/tabs/${tabId}`));
    const remaining = Object.keys(this.state.tabs).filter(id => id !== tabId);
    this.state.activeTab = remaining[0] || null;
  },

  addItem(tabId) {
    const input = document.getElementById('newItemInput');
    const text  = input ? input.value.trim() : prompt('待辦內容：');
    if (!text) return;
    if (input) input.value = '';

    const { db, ref, set } = window._fb;
    const itemId = this.generateId();
    this.showSyncStatus('pending');
    set(ref(db, `rooms/${this.state.roomId}/items/${itemId}`), {
      tabId, text, done: false, addedBy: this.state.nickname, addedAt: Date.now()
    });
  },

  toggleItem(itemId) {
    const item = this.state.items[itemId];
    if (!item) return;
    const { db, ref, update } = window._fb;
    this.showSyncStatus('pending');
    update(ref(db, `rooms/${this.state.roomId}/items/${itemId}`), {
      done: !item.done, doneBy: !item.done ? this.state.nickname : null
    });
  },

  deleteItem(itemId) {
    if (!confirm('確定要刪除？')) return;
    const { db, ref, remove } = window._fb;
    this.showSyncStatus('pending');
    remove(ref(db, `rooms/${this.state.roomId}/items/${itemId}`));
  },

  render() {
    const tabsStrip  = document.getElementById('tabsStrip');
    const tabContent = document.getElementById('tabContent');
    if (!tabsStrip || !tabContent) return;

    tabsStrip.innerHTML = '<span class="tab-add" onclick="app.addTab()">＋</span>';
    Object.entries(this.state.tabs)
      .sort(([,a],[,b]) => (a.order||0) - (b.order||0))
      .forEach(([tabId, tab]) => {
        const btn = document.createElement('div');
        btn.className = 'tab' + (this.state.activeTab === tabId ? ' active' : '');
        btn.textContent = tab.name;
        btn.onclick = () => { this.state.activeTab = tabId; this.render(); };
        btn.oncontextmenu = (e) => { e.preventDefault(); this.deleteTab(tabId); };
        tabsStrip.appendChild(btn);
      });

    const activeTab = this.state.tabs[this.state.activeTab];
    if (!activeTab) {
      tabContent.innerHTML = '<div class="empty-state"><div class="empty-icon">🌸</div><p>建立第一個分頁吧！</p></div>';
      return;
    }

    const tabItems = Object.entries(this.state.items)
      .filter(([, i]) => i.tabId === this.state.activeTab)
      .sort(([,a],[,b]) => (a.addedAt||0) - (b.addedAt||0));

    const doneCount = tabItems.filter(([,i]) => i.done).length;
    const progress  = tabItems.length ? Math.round(doneCount / tabItems.length * 100) : 0;

    let html = `
      <div style="margin-bottom:16px;">
        <div style="font-size:22px;font-weight:800;color:var(--brown-dark);">${this.escapeHtml(activeTab.name)}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">${doneCount}/${tabItems.length} 完成 · ${progress}%</div>
        <div style="height:6px;background:var(--cream3);border-radius:6px;overflow:hidden;">
          <div style="height:100%;width:${progress}%;background:var(--pink);transition:width 0.4s;"></div>
        </div>
      </div>
    `;

    if (tabItems.length) {
      html += '<div class="todo-list">';
      tabItems.forEach(([itemId, item]) => {
        html += `
          <div class="todo-item ${item.done ? 'done' : ''}">
            <div class="todo-checkbox ${item.done ? 'done' : ''}" onclick="app.toggleItem('${itemId}')">${item.done ? '✓' : ''}</div>
            <div class="todo-text">${this.escapeHtml(item.text)}</div>
            ${item.done && item.doneBy ? `<span class="todo-who">✓ ${this.escapeHtml(item.doneBy)}</span>` : ''}
            <button class="todo-delete" onclick="app.deleteItem('${itemId}')">🗑️</button>
          </div>
        `;
      });
      html += '</div>';
    } else {
      html += '<div class="empty-state"><div class="empty-icon">✨</div><p>加入第一個項目吧！</p></div>';
    }

    html += `
      <div class="add-form" style="margin-top:16px;">
        <input type="text" id="newItemInput" placeholder="新增待辦項目..." />
        <button class="add-btn" onclick="app.addItem('${this.state.activeTab}')">加入</button>
      </div>
    `;
    tabContent.innerHTML = html;

    document.getElementById('newItemInput')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') app.addItem(this.state.activeTab);
    });
  },

  showRoomInfo() {
    document.getElementById('modalRoomCode').textContent  = this.state.roomId;
    document.getElementById('modalUserCount').textContent = `${Object.keys(this.state.members).length} 人在線`;
    document.getElementById('roomInfoModal').classList.add('visible');
  },

  copyRoomCode() {
    navigator.clipboard.writeText(this.state.roomId).then(() => {
      const btn = document.getElementById('copyRoomBtn');
      if (btn) btn.textContent = '✅ 已複製！';
      setTimeout(() => { if (btn) btn.textContent = '📋 複製代碼'; }, 2000);
    });
  },

  leaveRoom() {
    if (!confirm('確定要離開房間？')) return;
    const { db, ref, remove } = window._fb;
    remove(ref(db, `rooms/${this.state.roomId}/presence/${this.state.userId}`));
    this._unsubs.forEach(u => u());
    this._unsubs = [];
    localStorage.removeItem('plannerUser');
    location.reload();
  },

  showSyncStatus(status) {
    const dot = document.getElementById('syncDot');
    if (dot) dot.className = 'sync-dot' + (status === 'pending' ? ' pending' : '');
    const txt = document.getElementById('syncText');
    if (txt) txt.textContent = status === 'pending' ? '同步中...' : '已同步';
  },

  _saveUser(username) {
    localStorage.setItem('plannerUser', JSON.stringify({
      username: username,
      lastRoomId: this.state.roomId
    }));
  },

  escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
  }
};
</script>
</body>
</html>
