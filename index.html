<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>✨ 我的計劃本（協作版）</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />
 <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    /* 使用變數定義所有顏色，方便切換主題 */
    :root {
      --cream: #faf7f2;
      --cream2: #f4efe6;
      --cream3: #ede6d8;
      --brown-light: #c4a882;
      --brown: #9b7b5a;
      --brown-dark: #6b5240;
      --pink: #f2a7b8;
      --pink-light: #fce8ee;
      --green: #7bc8a4;
      --green-light: #e8f7f0;
      --yellow: #f7d98c;
      --yellow-light: #fef8e7;
      --blue: #a7c4e8;
      --blue-light: #eaf2fb;
      --purple: #c4a8e8;
      --purple-light: #f3edfb;
      --text: #5c4a38;
      --text-muted: #9b8878;
      --border: #e2d8cc;
      --shadow: rgba(156, 123, 90, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Nunito", "Zen Maru Gothic", sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ════════════════════════════════════════════════
       登入 / 房間加入介面
    ════════════════════════════════════════════════ */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--cream) 0%, var(--cream2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: var(--radius);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 12px 40px var(--shadow);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .login-card h1 {
      font-size: 28px;
      margin-bottom: 24px;
      color: var(--brown-dark);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-group input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--brown-light);
      background: white;
    }

    .login-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--brown-dark);
      color: white;
    }
    .btn-primary:hover { background: var(--brown); transform: translateY(-1px); }

    .btn-secondary {
      background: var(--cream2);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: var(--cream3); }

    /* 狀態提示 */
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .status-online {
      background: var(--green-light);
      color: var(--green);
    }

    .status-offline {
      background: #ffebee;
      color: #c53030;
    }

    /* 複製房間代碼 */
    .room-code-section {
      background: var(--yellow-light);
      border: 1.5px solid var(--yellow);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin: 20px 0;
      text-align: center;
    }

    .room-code {
      font-size: 24px;
      font-weight: 800;
      color: var(--brown-dark);
      font-family: 'Courier New', monospace;
      letter-spacing: 4px;
      margin: 8px 0;
    }

    .copy-btn {
      background: var(--brown-dark);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: var(--brown); }
    .copy-btn.copied { background: var(--green); }

    /* ════════════════════════════════════════════════
       主應用介面
    ════════════════════════════════════════════════ */
    #appScreen {
      display: none;
    }

    /* 頂部列 */
    .topbar {
      background: var(--cream);
      border-bottom: 1.5px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--brown-dark);
    }

    .online-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    .online-indicator.offline {
      background: #d32f2f;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .topbar-users {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .room-info-btn, .leave-btn {
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .room-info-btn:hover { background: var(--cream2); color: var(--text); }
    .leave-btn:hover { border-color: #d32f2f; color: #d32f2f; }

    /* 主要內容 */
    .main-content {
      padding: 20px 16px 100px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* 分頁列 */
    .tabs-strip {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .tab {
      padding: 8px 14px;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: 1.5px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
      user-select: none;
    }

    .tab:hover { color: var(--text); background: var(--cream2); }

    .tab.active {
      color: var(--brown-dark);
      background: white;
      border-color: var(--border);
      border-bottom-color: white;
    }

    .tab-add {
      padding: 8px 12px;
      color: var(--brown-light);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      font-size: 16px;
    }
    .tab-add:hover { color: var(--brown); background: var(--cream2); }

    /* 清單 */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .todo-item:hover { box-shadow: 0 3px 14px var(--shadow); }

    .todo-item.done {
      opacity: 0.7;
      background: var(--cream2);
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .todo-checkbox {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 14px;
    }

    .todo-checkbox:hover { border-color: var(--brown-light); }

    .todo-checkbox.done {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .todo-delete {
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      color: #d32f2f;
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: all 0.2s;
    }

    .todo-item:hover .todo-delete { opacity: 1; }

    .todo-delete:hover { transform: scale(1.2); }

    /* 新增輸入框 */
    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .add-form input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus { border-color: var(--brown-light); background: white; }

    .add-btn {
      background: var(--pink);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .add-btn:hover { background: #e8919e; }

    /* 空狀態 */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

    /* Modal */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(91, 70, 56, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }

    .modal-bg.visible { display: flex; }

    .modal {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--brown-dark);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .sync-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-muted);
      box-shadow: 0 4px 12px var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    .sync-dot.pending {
      background: var(--yellow);
      animation: pulse 1s ease-in-out infinite;
    }

    @media (max-width: 480px) {
      .main-content { padding: 16px 12px 100px; }
      .topbar { padding: 12px 16px; }
      .topbar-title { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════
     登入畫面（房間加入）
════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <h1>✨ 計劃本協作</h1>

    <div id="statusBadge" class="status-badge status-offline">🔴 離線</div>

    <div class="form-group">
      <label>你的名字</label>
      <input type="text" id="nicknameInput" placeholder="例：小美" maxlength="20" />
    </div>

    <div class="form-group">
      <label>房間代碼（或留空建立新房間）</label>
      <input type="text" id="roomCodeInput" placeholder="例：ABC12345" maxlength="8" />
    </div>

    <div class="login-buttons">
      <button class="btn-primary" onclick="app.createRoom()">建立新房間</button>
      <button class="btn-secondary" onclick="app.joinRoom()">加入房間</button>
    </div>

    <!-- 已加入房間後顯示 -->
    <div id="roomCodeSection" class="room-code-section" style="display: none;">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">📌 房間代碼</div>
      <div class="room-code" id="displayRoomCode"></div>
      <button class="copy-btn" onclick="app.copyRoomCode()">📋 複製代碼</button>
      <div style="font-size: 11px; color: var(--text-muted); margin-top: 10px;">分享給朋友，他們可以用這個代碼加入</div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     主應用（計劃本）
════════════════════════════════════════════ -->
<div id="appScreen">
  <!-- 頂部列 -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="online-indicator" id="onlineIndicator"></div>
      <div class="topbar-title" id="appTitle">我的計劃本</div>
    </div>
    <div class="topbar-users" id="userCount">1 人在線</div>
    <div class="topbar-right">
      <button class="room-info-btn" onclick="app.showRoomInfo()">📍 房間</button>
      <button class="leave-btn" onclick="app.leaveRoom()">🚪 離開</button>
    </div>
  </div>

  <!-- 主要內容 -->
  <div class="main-content">
    <!-- 分頁列 -->
    <div class="tabs-strip" id="tabsStrip">
      <span class="tab-add" onclick="app.addTab()">＋</span>
    </div>

    <!-- 待辦列表 -->
    <div id="tabContent"></div>
  </div>

  <!-- 同步狀態 -->
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">已同步</span>
  </div>
</div>

<!-- 房間資訊 Modal -->
<div id="roomInfoModal" class="modal-bg">
  <div class="modal">
    <h2>📍 房間資訊</h2>
    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">房間代碼</div>
      <div style="font-size: 18px; font-weight: 800; font-family: monospace; letter-spacing: 2px;" id="modalRoomCode"></div>
    </div>
    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">在線人數</div>
      <div style="font-size: 18px; font-weight: 800;" id="modalUserCount"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="document.getElementById('roomInfoModal').classList.remove('visible')">關閉</button>
    </div>
  </div>
</div>

<script>
/**
 * 🎯 多人協作計劃本客戶端
 * ═════════════════════════════════════════
 * 功能：
 *   ✨ WebSocket 即時同步
 *   💾 localStorage 離線支援
 *   👥 多人協作
 *   🔔 即時通知
 * ═════════════════════════════════════════
 */

// ===================== FIREBASE 雲端連線設定 =====================
      const firebaseConfig = {
        apiKey: "AIzaSyBO3BaSLWDB1DA6znk6kdo7MTN5kW56AWQ",
        authDomain: "my-travel-planner-3c04a.firebaseapp.com",
        databaseURL: "https://my-travel-planner-3c04a-default-rtdb.firebaseio.com",
        projectId: "my-travel-planner-3c04a",
        storageBucket: "my-travel-planner-3c04a.firebasestorage.app",
        messagingSenderId: "1061443894751",
        appId: "1:1061443894751:web:9117b1071228fffe05186a",
        measurementId: "G-8DWEG0DFPZ"
      };

      // 初始化 Firebase 連線
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // 自動讀取網址上的房間名稱，例如 index.html?room=tokyo
      const urlParams = new URLSearchParams(window.location.search);
      const roomId = urlParams.get('room') || 'default-room';
      const roomRef = db.ref("rooms/" + roomId);

      let isIncomingRemoteUpdate = false; // 關鍵鎖：防止遠端與本地端更新陷入無限迴圈

      // ===================== STATE (狀態管理與預設資料) =====================
      let state = {
        title: "我的計劃本",
        folders: [
          { id: "f1", name: "生活" },
          { id: "f2", name: "工作" },
        ],
        tabs: [
          {
            id: "t1",
            name: "今日待辦",
            color: "#F2A7B8",
            folderId: "f1",
            items: [
              { id: "i1", text: "喝 8 杯水 💧", done: false },
              { id: "i2", text: "讀書 30 分鐘 📖", done: false },
              { id: "i3", text: "整理房間 🧹", done: true },
            ],
          },
          {
            id: "t2",
            name: "購物清單",
            color: "#7BC8A4",
            folderId: "f1",
            items: [
              { id: "i4", text: "牛奶", done: false },
              { id: "i5", text: "蔬菜沙拉材料", done: false },
            ],
          },
          {
            id: "t3",
            name: "工作任務",
            color: "#A7C4E8",
            folderId: "f2",
            items: [
              { id: "i6", text: "完成週報", done: false },
              { id: "i7", text: "回覆 Email", done: true },
            ],
          },
        ],
        activeTab: "t1",
        nextId: 100,
      };

      const TAB_COLORS = [
        "#F2A7B8",
        "#7BC8A4",
        "#F7D98C",
        "#A7C4E8",
        "#C4A8E8",
        "#F2C4A8",
        "#A8E8D4",
        "#E8A7C4",
      ];

      // ===================== SAVE/LOAD (雲端同步整合版) =====================
      function saveState() {
        try {
          // 同步存一份到具有房間區隔的本地端
          localStorage.setItem("plannerState_" + roomId, JSON.stringify(state));
          
          // 如果變動不是來自遠端的資料庫更新，就將新資料推上 Firebase 雲端
          if (!isIncomingRemoteUpdate) {
            roomRef.set(state);
          }
        } catch (e) {}
      }

      function loadState() {
        try {
          const s = localStorage.getItem("plannerState_" + roomId);
          if (s) {
            state = JSON.parse(s);
            if (!state.title) state.title = "我的計劃本";
          }
        } catch (e) {}
      }

      // 監聽雲端資料庫的實時同步機制
      function initFirebaseSync() {
        roomRef.on("value", (snapshot) => {
          const data = snapshot.val();
          if (data) {
            isIncomingRemoteUpdate = true; // 開鎖，避免重覆觸發 set()
            state = data;
            
            // 安全防護：確保當前選中的分頁有效
            if (!state.activeTab && state.tabs && state.tabs.length) {
              state.activeTab = state.tabs[0].id;
            }
            
            render(); // 收到遠端新資料，重新渲染畫面
            isIncomingRemoteUpdate = false; // 關鎖
          } else {
            // 如果雲端是空的（全新房間），讀取本地快取並推上去初始化
            loadState();
            saveState();
            render();
          }
        });
      }

      // ===================== RENDER (畫面渲染) =====================
      function render() {
        const titleEl = document.getElementById("topbarTitleText");
        if (document.activeElement !== titleEl) {
          titleEl.textContent = state.title || "我的計劃本";
        }

        renderTabs();
        renderPages();
        saveState();
      }

      function renderTabs() {
        const wrap = document.getElementById("tabsWrap");
        const addBtn = document.getElementById("addTabBtn");

        wrap.querySelectorAll(".tab, .tab-group").forEach((el) => el.remove());

        const grouped = {};
        const ungrouped = [];
        state.tabs.forEach((tab) => {
          if (tab.folderId) {
            if (!grouped[tab.folderId]) grouped[tab.folderId] = [];
            grouped[tab.folderId].push(tab);
          } else {
            ungrouped.push(tab);
          }
        });

        ungrouped.forEach((tab) => {
          const el = makeTabEl(tab);
          wrap.insertBefore(el, addBtn);
        });

        state.folders.forEach((folder) => {
          const tabs = grouped[folder.id] || [];

          const group = document.createElement("div");
          group.className = "tab-group";
          group.setAttribute("data-folder", folder.id);

          group.addEventListener("dragover", (e) => {
            e.preventDefault();
            group.classList.add("dragover");
          });
          group.addEventListener("dragleave", () => {
            group.classList.remove("dragover");
          });
          group.addEventListener("drop", (e) => {
            e.preventDefault();
            group.classList.remove("dragover");
            const tabId = e.dataTransfer.getData("text/plain");
            const folderId = group.getAttribute("data-folder");

            const targetTab = state.tabs.find((t) => t.id === tabId);
            if (targetTab) {
              targetTab.folderId = folderId;
              render();
            }
          });

          const fLabel = document.createElement("span");
          fLabel.className = "folder-icon";
          fLabel.textContent = `📁 ${folder.name}`;
          fLabel.title = "按右鍵/長按管理資料夾";

          fLabel.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            showFolderCtxMenu(e, folder.id);
          });

          let fTimer;
          fLabel.addEventListener(
            "touchstart",
            () => {
              fTimer = setTimeout(
                () => showFolderCtxMenu(null, folder.id, fLabel),
                600,
              );
            },
            { passive: true },
          );
          fLabel.addEventListener("touchend", () => clearTimeout(fTimer), {
            passive: true,
          });
          fLabel.addEventListener("touchmove", () => clearTimeout(fTimer), {
            passive: true,
          });

          group.appendChild(fLabel);

          tabs.forEach((tab) => {
            const el = makeTabEl(tab);
            group.appendChild(el);
          });
          wrap.insertBefore(group, addBtn);
        });
      }

      function makeTabEl(tab) {
        const el = document.createElement("div");
        el.className = "tab" + (state.activeTab === tab.id ? " active" : "");
        el.setAttribute("data-tabid", tab.id);
        el.innerHTML = `<span class="tab-color-dot" style="background:${tab.color}"></span>${tab.name}`;

        el.setAttribute("draggable", "true");
        el.addEventListener("dragstart", (e) => {
          e.dataTransfer.setData("text/plain", tab.id);
          el.classList.add("dragging");
        });
        el.addEventListener("dragend", () => {
          el.classList.remove("dragging");
          document
            .querySelectorAll(".tab-group")
            .forEach((g) => g.classList.remove("dragover"));
        });

        el.addEventListener("click", () => {
          state.activeTab = tab.id;
          render();
        });
        el.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          showCtxMenu(e, tab.id);
        });

        let pressTimer;
        el.addEventListener(
          "touchstart",
          () => {
            pressTimer = setTimeout(() => showCtxMenu(null, tab.id, el), 600);
          },
          { passive: true },
        );
        el.addEventListener("touchend", () => clearTimeout(pressTimer), {
          passive: true,
        });
        el.addEventListener("touchmove", () => clearTimeout(pressTimer), {
          passive: true,
        });

        return el;
      }

      function renderPages() {
        const main = document.getElementById("mainContent");
        main.innerHTML = "";
        state.tabs.forEach((tab) => {
          const page = document.createElement("div");
          page.className =
            "page" + (state.activeTab === tab.id ? " active" : "");
          page.setAttribute("data-page", tab.id);
          page.innerHTML = buildPageHTML(tab);
          main.appendChild(page);
          attachPageEvents(page, tab);
        });
      }

      function buildPageHTML(tab) {
        const done = tab.items.filter((i) => i.done).length;
        const total = tab.items.length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        const folderName = tab.folderId
          ? (state.folders.find((f) => f.id === tab.folderId) || {}).name
          : null;

        return `
          <div class="list-header">
            <div>
              ${folderName ? `<div style="font-size:11px;color:var(--text-muted);font-weight:700;margin-bottom:2px;">📁 ${folderName}</div>` : ""}
              <div class="list-title">${tab.name}</div>
              <div class="list-subtitle">${total ? `${done}/${total} 完成 · ${pct}%` : "還沒有任何項目"}</div>
            </div>
            <button class="add-item-btn" data-additem="${tab.id}">＋ 新增</button>
          </div>
          ${total ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>` : ""}
          <div class="add-form" id="addForm_${tab.id}">
            <input type="text" placeholder="輸入內容…" id="addInput_${tab.id}" maxlength="60" />
            <button class="confirm-btn" data-confirmitem="${tab.id}">加入</button>
          </div>
          ${total ? `<div class="swipe-hint">← 左滑項目露出垃圾桶點擊刪除</div>` : ""}
          <div class="todo-list" id="list_${tab.id}">
            ${tab.items.map((item) => buildItemHTML(item)).join("")}
          </div>
          ${total === 0 ? `<div class="empty-state"><div class="empty-icon">🌸</div><p>加入第一個計劃吧！</p></div>` : ""}
        `;
      }

      function buildItemHTML(item) {
        return `
          <div class="todo-item${item.done ? " done" : ""}" data-item="${item.id}">
            <div class="delete-bg">🗑️</div>
            <div class="todo-inner">
              <div class="check-btn${item.done ? " done" : ""}" data-check="${item.id}">
                <span class="smile">😊</span>
                <span class="checkmark">✓</span>
                <div class="ring"></div>
              </div>
              <div class="todo-text">${escHtml(item.text)}</div>
            </div>
          </div>
        `;
      }

      function attachPageEvents(page, tab) {
        if (page.querySelector(`[data-additem="${tab.id}"]`))
          page
            .querySelector(`[data-additem="${tab.id}"]`)
            .addEventListener("click", () => toggleAddForm(tab.id));

        if (page.querySelector(`[data-confirmitem="${tab.id}"]`))
          page
            .querySelector(`[data-confirmitem="${tab.id}"]`)
            .addEventListener("click", () => addItem(tab.id));

        const input = page.querySelector(`#addInput_${tab.id}`);
        if (input)
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") addItem(tab.id);
          });

        attachItemEvents(page, tab);
      }

      function attachItemEvents(page, tab) {
        page.querySelectorAll(".check-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleItem(btn.getAttribute("data-check"), tab.id, btn);
          });
        });

        page.querySelectorAll(".delete-bg").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const itemId = btn.closest(".todo-item").getAttribute("data-item");
            deleteItem(itemId, tab.id);
          });
        });

        page.querySelectorAll(".todo-item").forEach((el) => {
          attachSwipe(el, tab.id);
        });
      }

      // ===================== SWIPE TO DELETE (左滑刪除) =====================
      function attachSwipe(el, tabId) {
        const inner = el.querySelector(".todo-inner");
        let startX = 0,
          curX = 0,
          dragging = false,
          revealed = false;

        function onStart(x) {
          startX = x;
          curX = x;
          dragging = true;
        }
        function onMove(x) {
          if (!dragging) return;
          curX = x;
          let dx = curX - startX;
          if (revealed) dx -= 80;

          const finalX = Math.max(-100, Math.min(0, dx));
          inner.style.transition = "none";
          inner.style.transform = `translateX(${finalX}px)`;
        }
        function onEnd() {
          if (!dragging) return;
          dragging = false;
          inner.style.transition =
            "transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)";

          const dx = curX - startX;
          if (dx < -40) {
            inner.style.transform = "translateX(-80px)";
            revealed = true;
          } else {
            inner.style.transform = "translateX(0)";
            revealed = false;
          }
        }

        el.addEventListener(
          "touchstart",
          (e) => onStart(e.touches[0].clientX),
          { passive: true },
        );
        el.addEventListener(
          "touchmove",
          (e) => {
            if (dragging) onMove(e.touches[0].clientX);
          },
          { passive: true },
        );
        el.addEventListener("touchend", () => onEnd());

        inner.addEventListener("mousedown", (e) => {
          if (e.button === 0) onStart(e.clientX);
        });
        window.addEventListener("mousemove", (e) => {
          if (dragging) onMove(e.clientX);
        });
        window.addEventListener("mouseup", () => onEnd());

        inner.addEventListener(
          "click",
          (e) => {
            if (revealed) {
              e.preventDefault();
              e.stopPropagation();
              inner.style.transform = "translateX(0)";
              revealed = false;
            }
          },
          { capture: true },
        );
      }

      // ===================== ACTIONS (按鈕事件) =====================
      function toggleAddForm(tabId) {
        const form = document.getElementById(`addForm_${tabId}`);
        if (!form) return;
        const visible = form.classList.toggle("visible");
        if (visible) {
          const input = document.getElementById(`addInput_${tabId}`);
          if (input) setTimeout(() => input.focus(), 50);
        }
      }

      function addItem(tabId) {
        const input = document.getElementById(`addInput_${tabId}`);
        if (!input || !input.value.trim()) return;
        const text = input.value.trim();
        const tab = state.tabs.find((t) => t.id === tabId);
        if (!tab) return;
        tab.items.push({ id: "i" + ++state.nextId, text, done: false });
        input.value = "";
        render();
      }

      function toggleItem(itemId, tabId, btnEl) {
        const tab = state.tabs.find((t) => t.id === tabId);
        if (!tab) return;
        const item = tab.items.find((i) => i.id === itemId);
        if (!item) return;

        if (!item.done) {
          btnEl.classList.add("smiling");
          btnEl.querySelector(".smile").style.display = "block";
          setTimeout(() => {
            btnEl.classList.remove("smiling");
            btnEl.querySelector(".smile").style.display = "none";
            item.done = true;
            btnEl.classList.add("done");
            btnEl.querySelector(".checkmark").style.display = "block";
            btnEl.querySelector(".ring").style.animation =
              "ringPop 0.5s ease-out forwards";

            const itemEl = btnEl.closest(".todo-item");
            if (itemEl) itemEl.classList.add("done");
            spawnConfetti(btnEl.getBoundingClientRect());
            updateProgress(tabId);
            saveState();
          }, 600);
        } else {
          item.done = false;
          btnEl.classList.remove("done");
          btnEl.querySelector(".checkmark").style.display = "none";
          btnEl.querySelector(".ring").style.animation = "none";
          const itemEl = btnEl.closest(".todo-item");
          if (itemEl) itemEl.classList.remove("done");
          updateProgress(tabId);
          saveState();
        }
      }

      function updateProgress(tabId) {
        const tab = state.tabs.find((t) => t.id === tabId);
        if (!tab) return;
        const done = tab.items.filter((i) => i.done).length;
        const total = tab.items.length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        const fill = document.querySelector(
          `[data-page="${tabId}"] .progress-fill`,
        );
        if (fill) fill.style.width = pct + "%";
        const subtitle = document.querySelector(
          `[data-page="${tabId}"] .list-subtitle`,
        );
        if (subtitle) subtitle.textContent = `${done}/${total} 完成 · ${pct}%`;
      }

      function deleteItem(itemId, tabId) {
        const tab = state.tabs.find((t) => t.id === tabId);
        if (!tab) return;
        tab.items = tab.items.filter((i) => i.id !== itemId);
        render();
      }

      function spawnConfetti(rect) {
        const colors = ["#F2A7B8", "#7BC8A4", "#F7D98C", "#A7C4E8", "#C4A8E8"];
        for (let i = 0; i < 10; i++) {
          const el = document.createElement("div");
          el.className = "confetti-piece";
          el.style.cssText = `
            left: ${rect.left + rect.width / 2 + (Math.random() - 0.5) * 60}px;
            top: ${rect.top}px;
            background: ${colors[Math.floor(Math.random() * colors.length)]};
            border-radius: ${Math.random() > 0.5 ? "50%" : "2px"};
            width: ${6 + Math.random() * 6}px;
            height: ${6 + Math.random() * 6}px;
            animation-delay: ${Math.random() * 0.3}s;
            animation-duration: ${0.8 + Math.random() * 0.6}s;
          `;
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 1500);
        }
      }

      // ===================== CONTEXT MENU (右鍵/長按選單) =====================
      let ctxTabId = null;
      let ctxFolderId = null;

      function showCtxMenu(e, tabId, fromEl) {
        ctxTabId = tabId;
        const menu = document.getElementById("ctxMenu");
        menu.classList.add("visible");
        if (e) {
          let x = e.clientX,
            y = e.clientY;
          if (x + 160 > window.innerWidth) x = window.innerWidth - 165;
          if (y + 140 > window.innerHeight) y = window.innerHeight - 145;
          menu.style.left = x + "px";
          menu.style.top = y + "px";
        } else if (fromEl) {
          const r = fromEl.getBoundingClientRect();
          menu.style.left = r.left + "px";
          menu.style.top = r.bottom + 4 + "px";
        }
      }

      function showFolderCtxMenu(e, folderId, fromEl) {
        ctxFolderId = folderId;
        const menu = document.getElementById("folderCtxMenu");
        menu.classList.add("visible");
        if (e) {
          let x = e.clientX,
            y = e.clientY;
          if (x + 160 > window.innerWidth) x = window.innerWidth - 165;
          if (y + 140 > window.innerHeight) y = window.innerHeight - 145;
          menu.style.left = x + "px";
          menu.style.top = y + "px";
        } else if (fromEl) {
          const r = fromEl.getBoundingClientRect();
          menu.style.left = r.left + "px";
          menu.style.top = r.bottom + 4 + "px";
        }
      }

      function hideCtxMenu() {
        document.getElementById("ctxMenu").classList.remove("visible");
        document.getElementById("folderCtxMenu").classList.remove("visible");
      }

      document.getElementById("ctxDelete").addEventListener("click", () => {
        if (!ctxTabId) return;
        state.tabs = state.tabs.filter((t) => t.id !== ctxTabId);
        if (state.activeTab === ctxTabId)
          state.activeTab = state.tabs[0]?.id || null;
        hideCtxMenu();
        render();
      });

      document.getElementById("ctxRename").addEventListener("click", () => {
        if (!ctxTabId) return;
        const tab = state.tabs.find((t) => t.id === ctxTabId);
        if (!tab) return;
        hideCtxMenu();
        openTabModal(tab);
      });

      document.getElementById("ctxMove").addEventListener("click", () => {
        if (!ctxTabId) return;
        hideCtxMenu();
        openMoveModal(ctxTabId);
      });

      document
        .getElementById("ctxFolderRename")
        .addEventListener("click", () => {
          if (!ctxFolderId) return;
          const folder = state.folders.find((f) => f.id === ctxFolderId);
          if (!folder) return;
          hideCtxMenu();

          editingFolderId = folder.id;
          document.getElementById("folderModalTitle").textContent =
            "編輯資料夾";
          document.getElementById("folderNameInput").value = folder.name;
          document.getElementById("folderModal").classList.add("visible");
          setTimeout(
            () => document.getElementById("folderNameInput").focus(),
            100,
          );
        });

      document
        .getElementById("ctxFolderDelete")
        .addEventListener("click", () => {
          if (!ctxFolderId) return;
          const folder = state.folders.find((f) => f.id === ctxFolderId);
          if (!folder) return;
          hideCtxMenu();

          if (
            confirm(
              `確定要刪除「${folder.name}」資料夾嗎？\n（資料夾內的分頁將自動移至外層，計畫內容不會遺失喔！）`,
            )
          ) {
            state.folders = state.folders.filter((f) => f.id !== ctxFolderId);
            state.tabs.forEach((tab) => {
              if (tab.folderId === ctxFolderId) tab.folderId = null;
            });
            render();
          }
        });

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".ctx-menu")) hideCtxMenu();
      });

      // ===================== MODAL WINDOWS (彈出視窗) =====================
      let editingTabId = null;
      let editingFolderId = null;
      let selectedColor = TAB_COLORS[0];

      function openTabModal(existingTab) {
        editingTabId = existingTab ? existingTab.id : null;
        selectedColor = existingTab ? existingTab.color : TAB_COLORS[0];

        document.getElementById("modalTitle").textContent = existingTab
          ? "編輯分頁"
          : "新增分頁";
        document.getElementById("tabNameInput").value = existingTab
          ? existingTab.name
          : "";

        const cp = document.getElementById("colorPicker");
        cp.innerHTML = "";
        TAB_COLORS.forEach((c) => {
          const sw = document.createElement("div");
          sw.className =
            "color-swatch" + (c === selectedColor ? " selected" : "");
          sw.style.background = c;
          sw.addEventListener("click", () => {
            selectedColor = c;
            cp.querySelectorAll(".color-swatch").forEach((s) =>
              s.classList.remove("selected"),
            );
            sw.classList.add("selected");
          });
          cp.appendChild(sw);
        });

        const fs = document.getElementById("folderSelect");
        fs.innerHTML = '<option value="">不加入資料夾</option>';
        state.folders.forEach((f) => {
          const opt = document.createElement("option");
          opt.value = f.id;
          opt.textContent = f.name;
          if (existingTab && existingTab.folderId === f.id) opt.selected = true;
          fs.appendChild(opt);
        });

        const newOpt = document.createElement("option");
        newOpt.value = "__new__";
        newOpt.textContent = "＋ 新增資料夾…";
        fs.appendChild(newOpt);

        fs.addEventListener("change", function handler() {
          if (fs.value === "__new__") {
            fs.removeEventListener("change", handler);
            hideTabModal();
            openFolderModal(() => {
              openTabModal(existingTab);
            });
          }
        });

        document.getElementById("tabModal").classList.add("visible");
        setTimeout(() => document.getElementById("tabNameInput").focus(), 100);
      }

      function hideTabModal() {
        document.getElementById("tabModal").classList.remove("visible");
      }

      document
        .getElementById("addTabBtn")
        .addEventListener("click", () => openTabModal(null));
      document
        .getElementById("modalCancel")
        .addEventListener("click", hideTabModal);

      document.getElementById("modalConfirm").addEventListener("click", () => {
        const name = document.getElementById("tabNameInput").value.trim();
        if (!name) {
          document.getElementById("tabNameInput").focus();
          return;
        }
        const folderId = document.getElementById("folderSelect").value || null;

        if (editingTabId) {
          const tab = state.tabs.find((t) => t.id === editingTabId);
          if (tab) {
            tab.name = name;
            tab.color = selectedColor;
            tab.folderId = folderId === "__new__" ? null : folderId;
          }
        } else {
          state.tabs.push({
            id: "t" + ++state.nextId,
            name,
            color: selectedColor,
            folderId: folderId === "__new__" ? null : folderId,
            items: [],
          });
          state.activeTab = state.tabs[state.tabs.length - 1].id;
        }
        hideTabModal();
        render();
      });

      document
        .getElementById("tabNameInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter")
            document.getElementById("modalConfirm").click();
        });

      let folderCallback = null;
      function openFolderModal(cb) {
        folderCallback = cb;
        editingFolderId = null;
        document.getElementById("folderModalTitle").textContent = "新增資料夾";
        document.getElementById("folderNameInput").value = "";
        document.getElementById("folderModal").classList.add("visible");
        setTimeout(
          () => document.getElementById("folderNameInput").focus(),
          100,
        );
      }

      document.getElementById("folderCancel").addEventListener("click", () => {
        document.getElementById("folderModal").classList.remove("visible");
        editingFolderId = null;
        if (folderCallback) {
          folderCallback();
          folderCallback = null;
        }
      });

      document.getElementById("folderConfirm").addEventListener("click", () => {
        const name = document.getElementById("folderNameInput").value.trim();
        if (!name) {
          document.getElementById("folderNameInput").focus();
          return;
        }

        if (editingFolderId) {
          const folder = state.folders.find((f) => f.id === editingFolderId);
          if (folder) folder.name = name;
          editingFolderId = null;
        } else {
          const id = "f" + ++state.nextId;
          state.folders.push({ id, name });

          if (folderCallback) {
            document.getElementById("folderModal").classList.remove("visible");
            folderCallback();
            setTimeout(() => {
              const fs = document.getElementById("folderSelect");
              if (fs) {
                const opt = document.createElement("option");
                opt.value = id;
                opt.textContent = name;
                opt.selected = true;
                const newOpt = Array.from(fs.options).find(
                  (o) => o.value === "__new__",
                );
                fs.insertBefore(opt, newOpt);
                fs.value = id;
              }
            }, 50);
            folderCallback = null;
            return;
          }
        }

        document.getElementById("folderModal").classList.remove("visible");
        render();
      });

      document
        .getElementById("folderNameInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter")
            document.getElementById("folderConfirm").click();
        });

      let moveTabId = null;
      function openMoveModal(tabId) {
        moveTabId = tabId;
        const tab = state.tabs.find((t) => t.id === tabId);
        const sel = document.getElementById("moveFolderSelect");
        sel.innerHTML = '<option value="">不加入資料夾</option>';
        state.folders.forEach((f) => {
          const opt = document.createElement("option");
          opt.value = f.id;
          opt.textContent = f.name;
          if (tab && tab.folderId === f.id) opt.selected = true;
          sel.appendChild(opt);
        });
        document.getElementById("moveModal").classList.add("visible");
      }

      document.getElementById("moveCancelBtn").addEventListener("click", () => {
        document.getElementById("moveModal").classList.remove("visible");
      });

      document
        .getElementById("moveConfirmBtn")
        .addEventListener("click", () => {
          const folderId =
            document.getElementById("moveFolderSelect").value || null;
          const tab = state.tabs.find((t) => t.id === moveTabId);
          if (tab) tab.folderId = folderId;
          document.getElementById("moveModal").classList.remove("visible");
          render();
        });

      document.querySelectorAll(".modal-bg").forEach((bg) => {
        bg.addEventListener("click", (e) => {
          if (e.target === bg) {
            bg.classList.remove("visible");
            editingFolderId = null;
          }
        });
      });

      // ===================== HELPERS =====================
      function escHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ===================== INITIALIZATION (連線啟動) =====================
      // 啟動 Firebase 雲端資料庫同步（會自動處理本地載入與雲端覆蓋）
      initFirebaseSync();

      const titleTextEl = document.getElementById("topbarTitleText");
      titleTextEl.addEventListener("blur", () => {
        const newTitle = titleTextEl.textContent.trim();
        state.title = newTitle || "我的計劃本";
        saveState();
      });

      titleTextEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          titleTextEl.blur();
        }
      });

      const tabsWrapEl = document.getElementById("tabsWrap");
      tabsWrapEl.addEventListener("dragover", (e) => {
        e.preventDefault();
      });
      tabsWrapEl.addEventListener("drop", (e) => {
        if (!e.target.closest(".tab-group")) {
          e.preventDefault();
          const tabId = e.dataTransfer.getData("text/plain");
          const targetTab = state.tabs.find((t) => t.id === tabId);
          if (targetTab) {
            targetTab.folderId = null;
            render();
          }
        }
      });
</script>
</body>
</html>
