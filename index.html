<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>✨ 我的計劃本（協作帳號版）</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase, ref, set, get, update, remove,
      onValue, onChildAdded, onChildChanged, onChildRemoved,
      push, serverTimestamp, onDisconnect
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    /* ══════════════════════════════════════════════
       🔥 請在此填入你的 Firebase 設定（請確保與你的資料庫一致）
    ══════════════════════════════════════════════ */
    const firebaseConfig = {
      apiKey:            "YOUR_API_KEY",
      authDomain:        "YOUR_PROJECT.firebaseapp.com",
      databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId:         "YOUR_PROJECT",
      storageBucket:     "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId:             "YOUR_APP_ID"
    };

    try {
      const firebaseApp = initializeApp(firebaseConfig);
      const db = getDatabase(firebaseApp);

      window._fb = {
        db, ref, set, get, update, remove,
        onValue, onChildAdded, onChildChanged, onChildRemoved,
        push, serverTimestamp, onDisconnect
      };
    } catch(e) {
      console.error("Firebase 初始化失敗，請檢查設定金鑰:", e);
    }

    /* Firebase 載入後才初始化 app */
    document.addEventListener('DOMContentLoaded', () => {
      app.init();
    });
  </script>

  <style>
    :root {
      --cream: #faf7f2;
      --cream2: #f4efe6;
      --cream3: #ede6d8;
      --brown-light: #c4a882;
      --brown: #9b7b5a;
      --brown-dark: #6b5240;
      --pink: #f2a7b8;
      --pink-light: #fce8ee;
      --green: #7bc8a4;
      --green-light: #e8f7f0;
      --yellow: #f7d98c;
      --yellow-light: #fef8e7;
      --blue: #a7c4e8;
      --blue-light: #eaf2fb;
      --purple: #c4a8e8;
      --purple-light: #f3edfb;
      --text: #5c4a38;
      --text-muted: #9b8878;
      --border: #e2d8cc;
      --shadow: rgba(156, 123, 90, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Nunito", "Zen Maru Gothic", sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 登入 / 註冊畫面 ── */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--cream) 0%, var(--cream2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      overflow-y: auto;
    }

    .login-card {
      background: white;
      border-radius: var(--radius);
      padding: 35px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 12px 40px var(--shadow);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .login-card h1 { font-size: 26px; margin-bottom: 20px; color: var(--brown-dark); text-align: center; font-weight: 800; }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .form-group input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--brown-light); background: white; }

    .login-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }

    .btn-primary, .btn-secondary {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-primary { background: var(--brown-dark); color: white; }
    .btn-primary:hover { background: var(--brown); }
    .btn-secondary { background: var(--cream2); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--cream3); }

    .btn-loading { opacity: 0.7; pointer-events: none; }

    .auth-toggle-link {
      font-size: 13px;
      text-align: center;
      color: var(--brown);
      cursor: pointer;
      margin-top: 14px;
      text-decoration: underline;
      font-weight: 600;
    }

    .status-badge {
      display: block;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }
    .status-online  { background: var(--green-light); color: var(--green); }
    .status-offline { background: #ffebee; color: #c53030; }

    .room-code-section {
      background: var(--yellow-light);
      border: 1.5px solid var(--yellow);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin: 20px 0;
      text-align: center;
    }
    .room-code {
      font-size: 24px;
      font-weight: 800;
      color: var(--brown-dark);
      font-family: 'Courier New', monospace;
      letter-spacing: 4px;
      margin: 8px 0;
    }
    .copy-btn {
      background: var(--brown-dark);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .copy-btn:hover  { background: var(--brown); }
    .copy-btn.copied { background: var(--green); }

    /* ── 主應用 ── */
    #appScreen { display: none; }

    .topbar {
      background: var(--cream);
      border-bottom: 1.5px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; flex: 1; }
    .topbar-title { font-size: 20px; font-weight: 800; color: var(--brown-dark); }

    .online-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    .online-indicator.offline { background: #d32f2f; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .topbar-users { font-size: 12px; color: var(--text-muted); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .room-info-btn, .leave-btn {
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .room-info-btn:hover { background: var(--cream2); color: var(--text); }
    .leave-btn:hover     { border-color: #d32f2f; color: #d32f2f; }

    .main-content {
      padding: 20px 16px 100px;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── 分頁 ── */
    .tabs-strip {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      overflow-x: auto;
    }
    .tab {
      padding: 8px 14px;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: 1.5px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
      user-select: none;
    }
    .tab:hover { color: var(--text); background: var(--cream2); }
    .tab.active {
      color: var(--brown-dark);
      background: white;
      border-color: var(--border);
      border-bottom-color: white;
    }
    .tab-add {
      padding: 8px 12px;
      color: var(--brown-light);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
      font-size: 16px;
    }
    .tab-add:hover { color: var(--brown); background: var(--cream2); }

    /* ── 待辦清單 ── */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .todo-item:hover { box-shadow: 0 3px 14px var(--shadow); }
    .todo-item.done { opacity: 0.7; background: var(--cream2); }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-muted); }

    .todo-who {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--cream2);
      border-radius: 20px;
      padding: 2px 7px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .todo-checkbox {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 14px;
    }
    .todo-checkbox:hover  { border-color: var(--brown-light); }
    .todo-checkbox.done   { border-color: var(--green); background: var(--green-light); color: var(--green); }

    .todo-text { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }

    .todo-delete {
      width: 28px; height: 28px;
      border: none;
      background: none;
      color: #d32f2f;
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: all 0.2s;
    }
    .todo-item:hover .todo-delete { opacity: 1; }
    .todo-delete:hover { transform: scale(1.2); }

    .add-form { display: flex; gap: 10px; margin-bottom: 16px; }
    .add-form input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 13px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }
    .add-form input:focus { border-color: var(--brown-light); background: white; }

    .add-btn {
      background: var(--pink);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .add-btn:hover { background: #e8919e; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-icon  { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

    .members-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: var(--cream2);
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
    }
    .member-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      background: white;
      border-radius: 20px;
      padding: 4px 10px;
      border: 1.5px solid var(--border);
    }
    .member-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(91, 70, 56, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }
    .modal-bg.visible { display: flex; }
    .modal {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0,0,0,.15);
    }
    .modal h2 { font-size: 18px; margin-bottom: 16px; color: var(--brown-dark); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

    .sync-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-muted);
      box-shadow: 0 4px 12px var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
    }
    .sync-dot.pending { background: var(--yellow); animation: pulse 1s ease-in-out infinite; }

    @media (max-width: 480px) {
      .main-content { padding: 16px 12px 100px; }
      .topbar       { padding: 12px 16px; }
      .topbar-title  { font-size: 18px; }
    }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1 id="authMainTitle">🔐 計劃本登入</h1>

    <div id="statusBadge" class="status-badge status-offline">🔴 連線中...</div>

    <div class="form-group">
      <label>帳號 (Username)</label>
      <input type="text" id="authUsername" placeholder="請輸入英文或數字帳號" />
    </div>
    
    <div class="form-group">
      <label>密碼 (Password)</label>
      <input type="password" id="authPassword" placeholder="請輸入密碼" />
    </div>

    <div class="form-group" id="nickGroup" style="display: none;">
      <label>你的名字 / 顯示暱稱</label>
      <input type="text" id="nicknameInput" placeholder="例：小美" maxlength="20" />
    </div>

    <div class="form-group" id="roomGroup">
      <label>房間代碼（或留空建立新房間）</label>
      <input type="text" id="roomCodeInput" placeholder="例：ABC12345" maxlength="8" style="text-transform:uppercase;" />
    </div>

    <div class="login-buttons" id="authActionBox">
      <button class="btn-primary" id="loginSubmitBtn" onclick="app.handleLogin()">登入系統並進入房間</button>
      <div class="auth-toggle-link" onclick="app.switchAuthMode('register')">沒有帳號？前往「註冊新帳號」</div>
    </div>

    <div id="roomCodeSection" class="room-code-section" style="display:none;">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">📌 房間代碼</div>
      <div class="room-code" id="displayRoomCode"></div>
      <button class="copy-btn" id="copyRoomBtn" onclick="app.copyRoomCode()">📋 複製代碼</button>
      <div style="font-size:11px;color:var(--text-muted);margin-top:10px;">
        分享給朋友，他們可以用這個代碼加入
      </div>
      <button class="btn-primary" style="width:100%;margin-top:14px;" onclick="app.enterApp()">
        進入計劃本 →
      </button>
    </div>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="online-indicator" id="onlineIndicator"></div>
      <div class="topbar-title" id="appTitle">我的計劃本</div>
    </div>
    <div class="topbar-users" id="userCount">1 人在線</div>
    <div class="topbar-right">
      <button class="room-info-btn" onclick="app.showRoomInfo()">📍 房間</button>
      <button class="leave-btn"     onclick="app.leaveRoom()">🚪 離開</button>
    </div>
  </div>

  <div class="main-content">
    <div class="members-bar" id="membersBar"></div>

    <div class="tabs-strip" id="tabsStrip">
      <span class="tab-add" onclick="app.addTab()">＋</span>
    </div>

    <div id="tabContent"></div>
  </div>

  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">已同步</span>
  </div>
</div>

<div id="roomInfoModal" class="modal-bg">
  <div class="modal">
    <h2>📍 房間資訊</h2>
    <div style="margin-bottom:16px;">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">房間代碼</div>
      <div style="font-size:18px;font-weight:800;font-family:monospace;letter-spacing:2px;" id="modalRoomCode"></div>
    </div>
    <div style="margin-bottom:16px;">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">在線人數</div>
      <div style="font-size:18px;font-weight:800;" id="modalUserCount"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="app.copyRoomCode()">📋 複製代碼</button>
      <button class="btn-primary" onclick="document.getElementById('roomInfoModal').classList.remove('visible')">關閉</button>
    </div>
  </div>
</div>

<script>
const app = {
  /* ── 狀態 ── */
  state: {
    roomId:     null,
    userId:     null,
    nickname:   null,
    isOnline:   false,
    tabs:       {},   
    items:      {},   
    members:    {},   
    activeTab:  null,
    authMode:   'login' // 'login' 或 'register'
  },

  _unsubs: [],

  /* ── 初始化 ── */
  init() {
    const wait = setInterval(() => {
      if (window._fb) {
        clearInterval(wait);
        this._onFirebaseReady();
      }
    }, 50);
  },

  _onFirebaseReady() {
    const saved = localStorage.getItem('plannerUser');
    if (saved) {
      try {
        const u = JSON.parse(saved);
        if(u.username) document.getElementById('authUsername').value = u.username;
        document.getElementById('nicknameInput').value  = u.nickname   || '';
        document.getElementById('roomCodeInput').value  = u.lastRoomId || '';
      } catch(_) {}
    }

    const badge = document.getElementById('statusBadge');
    if (badge) {
      badge.className = 'status-badge status-online';
      badge.textContent = '🟢 Firebase 已連線';
    }
  },

  /* ── 切換登入 / 註冊頁面（按鈕與上一頁機制） ── */
  switchAuthMode(mode) {
    this.state.authMode = mode;
    const title = document.getElementById('authMainTitle');
    const nickGroup = document.getElementById('nickGroup');
    const roomGroup = document.getElementById('roomGroup');
    const actionBox = document.getElementById('authActionBox');

    if (mode === 'register') {
      title.textContent = "📝 註冊新帳號";
      nickGroup.style.display = "block";   // 註冊需要填暱稱
      roomGroup.style.display = "none";    // 註冊時先隱藏房間區
      
      actionBox.innerHTML = `
        <button class="btn-primary" onclick="app.handleRegisterSubmit()">確定註冊帳號</button>
        <button class="btn-secondary" style="margin-top:4px;" onclick="app.switchAuthMode('login')">⬅️ 返回登入頁面</button>
      `;
    } else {
      title.textContent = "🔐 計劃本登入";
      nickGroup.style.display = "none";
      roomGroup.style.display = "block";
      
      actionBox.innerHTML = `
        <button class="btn-primary" onclick="app.handleLogin()">登入系統並進入房間</button>
        <div class="auth-toggle-link" onclick="app.switchAuthMode('register')">沒有帳號？前往「註冊新帳號」</div>
      `;
    }
  },

  /* ── 註冊提交動作 ── */
  async handleRegisterSubmit() {
    if (!window._fb) return alert("系統連線中，請稍後再試！");
    
    const user = document.getElementById('authUsername').value.trim().toLowerCase();
    const pass = document.getElementById('authPassword').value.trim();
    const nick = document.getElementById('nicknameInput').value.trim();

    if (!user || !pass || !nick) return alert("請填寫完整帳號、密碼與顯示名字！");

    const { db, ref, get, set } = window._fb;
    
    try {
      // 檢查帳號是否存在
      const snap = await get(ref(db, `users/${user}`));
      if (snap.exists()) return alert("此帳號已存在，請更換一個帳號名稱！");

      // 寫入使用者資料庫節點
      await set(ref(db, `users/${user}`), {
        username: user,
        password: pass,
        nickname: nick,
        createdAt: Date.now()
      });

      alert("🎉 註冊成功！已自動幫您代入資訊，請直接登入。");
      
      // 自動切換回上一頁（登入頁面）
      this.switchAuthMode('login');
    } catch(e) {
      console.error(e);
      alert("註冊發生錯誤，請確認資料庫規則權限：" + e.message);
    }
  },

  /* ── 登入並派發房間動作 ── */
  async handleLogin() {
    if (!window._fb) return alert("系統連線中，請稍後再試！");

    const user = document.getElementById('authUsername').value.trim().toLowerCase();
    const pass = document.getElementById('authPassword').value.trim();
    const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();

    if (!user || !pass) return alert("請輸入帳號與密碼！");

    const { db, ref, get, set } = window._fb;

    try {
      // 驗證帳密
      const snap = await get(ref(db, `users/${user}`));
      if (!snap.exists() || snap.val().password !== pass) {
        return alert("帳號或密碼錯誤，請再試一次！");
      }

      // 提取該帳號註冊時的暱稱
      const verifiedNickname = snap.val().nickname || user;
      
      this.state.nickname = verifiedNickname;
      this.state.userId   = this._genUserId();

      // 如果房間欄位留空 -> 自動創建新房間
      if (!roomCode) {
        const newRoomId = this._genRoomId();
        this.state.roomId = newRoomId;

        await set(ref(db, `rooms/${newRoomId}/meta`), {
          createdAt: Date.now(),
          createdBy: verifiedNickname
        });
        
        this._saveUser(user);
        this.showRoomCode(); // 顯示 8 碼代碼並讓使用者確認點擊進入
      } else {
        // 如果有填房間號 -> 檢查並直接加入
        const roomSnap = await get(ref(db, `rooms/${roomCode}/meta`));
        if (!roomSnap.exists()) return alert("找不到此代碼房間，請確認是否輸入正確！");

        this.state.roomId = roomCode;
        this._saveUser(user);
        this.enterApp();
      }

    } catch(e) {
      console.error(e);
      alert("登入處理失敗：" + e.message);
    }
  },

  _genRoomId() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length: 8}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  },

  _genUserId() {
    let id = localStorage.getItem('userId');
    if (!id) {
      id = 'u_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('userId', id);
    }
    return id;
  },

  generateId() {
    return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  },

  enterApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display   = 'block';
    document.getElementById('appTitle').textContent = `${this.state.nickname} 的計劃本`;

    this.state.isOnline = true;
    this.updateOnlineStatus();
    this._setupPresence();
    this._listenTabs();
    this._listenItems();
    this._listenMembers();
  },

  _setupPresence() {
    const { db, ref, set, onDisconnect } = window._fb;
    const presRef = ref(db, `rooms/${this.state.roomId}/presence/${this.state.userId}`);

    set(presRef, { nickname: this.state.nickname, online: true, joinedAt: Date.now() });
    onDisconnect(presRef).remove();   
  },

  _listenMembers() {
    const { db, ref, onValue } = window._fb;
    const presRef = ref(db, `rooms/${this.state.roomId}/presence`);
    const unsub = onValue(presRef, snap => {
      this.state.members = snap.val() || {};
      const count = Object.keys(this.state.members).length;
      document.getElementById('userCount').textContent = `${count} 人在線`;
      this._renderMembers();
    });
    this._unsubs.push(unsub);
  },

  _renderMembers() {
    const bar = document.getElementById('membersBar');
    const members = this.state.members;
    bar.innerHTML = Object.entries(members).map(([uid, m]) => `
      <div class="member-chip">
        <div class="member-dot"></div>
        ${this.escapeHtml(m.nickname)}${uid === this.state.userId ? ' (你)' : ''}
      </div>
    `).join('');
  },

  _listenTabs() {
    const { db, ref, onValue } = window._fb;
    const tabsRef = ref(db, `rooms/${this.state.roomId}/tabs`);
    const unsub = onValue(tabsRef, snap => {
      this.state.tabs = snap.val() || {};
      if (!this.state.activeTab || !this.state.tabs[this.state.activeTab]) {
        const ids = Object.keys(this.state.tabs);
        this.state.activeTab = ids.length ? ids[0] : null;
      }
      this.render();
      this.showSyncStatus('synced');
    });
    this._unsubs.push(unsub);
  },

  _listenItems() {
    const { db, ref, onValue } = window._fb;
    const itemsRef = ref(db, `rooms/${this.state.roomId}/items`);
    const unsub = onValue(itemsRef, snap => {
      this.state.items = snap.val() || {};
      this.render();
    });
    this._unsubs.push(unsub);
  },

  addTab() {
    const name = prompt('分頁名稱：');
    if (!name) return;

    const { db, ref, set } = window._fb;
    const tabId = this.generateId();
    const colors = ['#F2A7B8','#7BC8A4','#F7D98C','#A7C4E8','#C4A8E8'];
    const color  = colors[Math.floor(Math.random() * colors.length)];

    this.showSyncStatus('pending');
    set(ref(db, `rooms/${this.state.roomId}/tabs/${tabId}`), {
      name, color, order: Date.now()
    }).then(() => {
      this.state.activeTab = tabId;
    });
  },

  deleteTab(tabId) {
    if (!confirm(`確定刪除分頁「${this.state.tabs[tabId]?.name}」及其所有項目？`)) return;
    const { db, ref, remove } = window._fb;
    this.showSyncStatus('pending');

    Object.entries(this.state.items).forEach(([iid, item]) => {
      if (item.tabId === tabId) remove(ref(db, `rooms/${this.state.roomId}/items/${iid}`));
    });
    remove(ref(db, `rooms/${this.state.roomId}/tabs/${tabId}`));

    const remaining = Object.keys(this.state.tabs).filter(id => id !== tabId);
    this.state.activeTab = remaining[0] || null;
  },

  addItem(tabId) {
    const input = document.getElementById('newItemInput');
    const text  = input ? input.value.trim() : prompt('待辦內容：');
    if (!text) return;
    if (input) input.value = '';

    const { db, ref, set } = window._fb;
    const itemId = this.generateId();
    this.showSyncStatus('pending');
    set(ref(db, `rooms/${this.state.roomId}/items/${itemId}`), {
      tabId,
      text,
      done:    false,
      doneBy:  null,
      doneAt:  null,
      addedBy: this.state.nickname,
      addedAt: Date.now()
    });
  },

  toggleItem(itemId) {
    const item = this.state.items[itemId];
    if (!item) return;

    const { db, ref, update } = window._fb;
    const nowDone = !item.done;
    this.showSyncStatus('pending');
    update(ref(db, `rooms/${this.state.roomId}/items/${itemId}`), {
      done:   nowDone,
      doneBy: nowDone ? this.state.nickname : null,
      doneAt: nowDone ? Date.now() : null
    });
  },

  deleteItem(itemId) {
    if (!confirm('確定要刪除？')) return;
    const { db, ref, remove } = window._fb;
    this.showSyncStatus('pending');
    remove(ref(db, `rooms/${this.state.roomId}/items/${itemId}`));
  },

  render() {
    const tabsStrip  = document.getElementById('tabsStrip');
    const tabContent = document.getElementById('tabContent');
    if (!tabsStrip || !tabContent) return;

    tabsStrip.innerHTML = '<span class="tab-add" onclick="app.addTab()">＋</span>';
    const sortedTabs = Object.entries(this.state.tabs)
      .sort(([,a],[,b]) => (a.order||0) - (b.order||0));

    sortedTabs.forEach(([tabId, tab]) => {
      const btn = document.createElement('div');
      btn.className = 'tab' + (this.state.activeTab === tabId ? ' active' : '');
      btn.textContent = tab.name;
      btn.onclick = () => { this.state.activeTab = tabId; this.render(); };
      btn.oncontextmenu = (e) => {
        e.preventDefault();
        this.deleteTab(tabId);
      };
      tabsStrip.appendChild(btn);
    });

    const activeTab = this.state.tabs[this.state.activeTab];
    if (!activeTab) {
      tabContent.innerHTML = '<div class="empty-state"><div class="empty-icon">🌸</div><p>建立第一個分頁吧！</p></div>';
      return;
    }

    const tabItems = Object.entries(this.state.items)
      .filter(([, i]) => i.tabId === this.state.activeTab)
      .sort(([,a],[,b]) => (a.addedAt||0) - (b.addedAt||0));

    const doneCount = tabItems.filter(([,i]) => i.done).length;
    const progress  = tabItems.length ? Math.round(doneCount / tabItems.length * 100) : 0;

    const progressColor = progress === 100 ? 'var(--green)' : progress > 50 ? 'var(--yellow)' : 'var(--pink)';

    let html = `
      <div style="margin-bottom:16px;">
        <div style="font-size:22px;font-weight:800;color:var(--brown-dark);margin-bottom:4px;">${this.escapeHtml(activeTab.name)}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">${doneCount}/${tabItems.length} 完成 · ${progress}%</div>
        <div style="height:6px;background:var(--cream3);border-radius:6px;overflow:hidden;">
          <div style="height:100%;width:${progress}%;background:${progressColor};transition:width 0.4s;border-radius:6px;"></div>
        </div>
      </div>
    `;

    if (tabItems.length) {
      html += '<div class="todo-list">';
      tabItems.forEach(([itemId, item]) => {
        const whoTag = item.done && item.doneBy
          ? `<span class="todo-who">✓ ${this.escapeHtml(item.doneBy)}</span>`
          : '';
        html += `
          <div class="todo-item ${item.done ? 'done' : ''}">
            <div class="todo-checkbox ${item.done ? 'done' : ''}" onclick="app.toggleItem('${itemId}')">
              ${item.done ? '✓' : ''}
            </div>
            <div class="todo-text">${this.escapeHtml(item.text)}</div>
            ${whoTag}
            <button class="todo-delete" onclick="app.deleteItem('${itemId}')">🗑️</button>
          </div>
        `;
      });
      html += '</div>';
    } else {
      html += '<div class="empty-state"><div class="empty-icon">✨</div><p>加入第一個項目吧！</p></div>';
    }

    html += `
      <div class="add-form" style="margin-top:16px;">
        <input type="text" id="newItemInput" placeholder="新增待辦項目..." />
        <button class="add-btn" onclick="app.addItem('${this.state.activeTab}')">加入</button>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">
        💡 在分頁名稱上右鍵可刪除分頁
      </div>
    `;

    tabContent.innerHTML = html;

    const input = document.getElementById('newItemInput');
    if (input) {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') app.addItem(this.state.activeTab);
      });
    }
  },

  showRoomCode() {
    document.getElementById('displayRoomCode').textContent = this.state.roomId;
    document.getElementById('roomCodeSection').style.display = 'block';
  },

  showRoomInfo() {
    document.getElementById('modalRoomCode').textContent  = this.state.roomId;
    document.getElementById('modalUserCount').textContent =
      `${Object.keys(this.state.members).length} 人在線`;
    document.getElementById('roomInfoModal').classList.add('visible');
  },

  copyRoomCode() {
    navigator.clipboard.writeText(this.state.roomId).then(() => {
      const btn = document.getElementById('copyRoomBtn');
      if (btn) { btn.textContent = '✅ 已複製！'; btn.classList.add('copied'); }
      setTimeout(() => {
        if (btn) { btn.textContent = '📋 複製代碼'; btn.classList.remove('remove'); }
      }, 2000);
    });
  },

  leaveRoom() {
    if (!confirm('確定要離開房間？')) return;
    const { db, ref, remove } = window._fb;
    remove(ref(db, `rooms/${this.state.roomId}/presence/${this.state.userId}`));
    this._unsubs.forEach(u => u());
    this._unsubs = [];
    this.state.roomId = null;
    localStorage.removeItem('plannerUser');
    location.reload();
  },

  updateOnlineStatus() {
    const indicator = document.getElementById('onlineIndicator');
    const badge     = document.getElementById('statusBadge');
    if (this.state.isOnline) {
      indicator?.classList.remove('offline');
      badge?.classList.replace('status-offline','status-online');
      if (badge) badge.textContent = '🟢 在線';
    } else {
      indicator?.classList.add('offline');
      badge?.classList.replace('status-online','status-offline');
      if (badge) badge.textContent = '🔴 離線';
    }
  },

  showSyncStatus(status) {
    const dot  = document.getElementById('syncDot');
    const text = document.getElementById('syncText');
    if (!dot || !text) return;
    if (status === 'pending') {
      dot.classList.add('pending');
      text.textContent = '同步中...';
    } else {
      dot.classList.remove('pending');
      text.textContent = '已同步';
    }
  },

  _saveUser(username) {
    localStorage.setItem('plannerUser', JSON.stringify({
      username: username,
      nickname: this.state.nickname,
      lastRoomId: this.state.roomId
    }));
  },

  escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
    }[m]));
  }
};
</script>
</body>
</html>
